    if (repType === "ytd") {
      const months=[...new Set(gifts.map(g=>g.month).filter(Boolean))].sort();
      let cumPlanned=0,cumIssued=0,cumGiftAmt=0,cumGiftActSales=0;
      body += `<h2>Year-to-Date Cumulative Summary</h2>
      <table style="table-layout:fixed;width:100%">
        <colgroup><col style="width:12%"><col style="width:10%"><col style="width:10%"><col style="width:13%"><col style="width:15%"><col style="width:15%"><col style="width:12%"><col style="width:13%"></colgroup>
        <thead><tr><th>Month</th><th>Gifts</th><th>Issued</th><th>Cumul. Planned</th><th>Cumul. Gift Amt</th><th>Cumul. Gift Sales</th><th>Month ROI</th><th>YTD ROI</th></tr></thead><tbody>`;
      months.forEach(m=>{
        const mg=gifts.filter(g=>g.month===m&&(selArea==="all"||g.asmName===selArea)&&(selHQ==="all"||g.hqName===selHQ));
        const mi=mg.filter(g=>g.issued);
        const mMrp=mg.reduce((s,g)=>s+Number(g.giftMrp||0),0);
        const mGiftAct=mi.reduce((s,g)=>s+(g.crmType==="CRM"?(g.giftActualSales||g.actualSales||[]).reduce((s,r)=>s+Number(r.amt||0),0):(g.actualSales||[]).reduce((s,r)=>s+Number(r.amt||0),0)),0);
        const mActMrp=mi.reduce((s,g)=>s+Number(g.giftMrp||0),0);
        const mRoi=mActMrp>0&&mGiftAct>0?(mGiftAct/mActMrp).toFixed(2):null;
        cumPlanned+=mg.length; cumIssued+=mi.length; cumGiftAmt+=mMrp; cumGiftActSales+=mGiftAct;
        const ytdRoi=cumGiftAmt>0&&cumGiftActSales>0?(cumGiftActSales/cumGiftAmt).toFixed(2):null;
        const mRoiLbl=mRoi?(Number(mRoi)<3?"Poor":Number(mRoi)<4?"Avg":Number(mRoi)<5?"Good":"Excel"):"—";
        const ytdLbl=ytdRoi?(Number(ytdRoi)<3?"Poor":Number(ytdRoi)<4?"Avg":Number(ytdRoi)<5?"Good":"Excel"):"—";
        body+=`<tr><td><strong>${m}</strong></td><td>${mg.length}</td><td>${mi.length}</td><td>${cumPlanned}</td><td>${fmt(cumGiftAmt)}</td><td>${fmt(cumGiftActSales)}</td><td class="${mRoi&&Number(mRoi)>=3?"g":"r"}">${mRoi?mRoi+"x "+mRoiLbl:"—"}</td><td class="${ytdRoi&&Number(ytdRoi)>=3?"g":"r"}"><strong>${ytdRoi?ytdRoi+"x "+ytdLbl:"—"}</strong></td></tr>`;
      });
      body+=`</tbody></table>`;
    }


    body += `<div style="margin-top:32px;font-size:10px;color:#d1d5db;text-align:center;border-top:1px solid #f3f4f6;padding-top:8px">GiftTrack – Aldan Healthcare · Generated ${new Date().toLocaleDateString("en-IN")}</div>`;

    return `<!DOCTYPE html><html><head><meta charset="UTF-8"><title>GiftTrack Report</title>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;700;800&display=swap" rel="stylesheet"/>
    <style>${css}</style></head><body>

  const openReport = () => {
    const win = window.open("", "_blank");
    win.document.write(generateHTML());
    win.document.close();
  };

  return (
    <div className="space-y-4">
      <div className="card p-5">
        <h2 className="font-black text-gray-800 mb-4">📊 Generate Reports</h2>

        <div className="grid grid-cols-2 md:grid-cols-4 gap-4 mb-4">
          <div>
            <div className="section-label">Report Type</div>
            <select value={repType} onChange={e=>setRepType(e.target.value)} className="inp">
              <option value="deviation">Gift Plan vs Actual Deviation</option>
              <option value="summary">ASM/HQ/Month Summary</option>
              <option value="pending">Pending Actual Entry</option>
              <option value="leaderboard">Doctor ROI Leaderboard</option>
              <option value="mom">Month-over-Month Comparison</option>
              <option value="doctor">Doctor-wise Report</option>
              <option value="ytd">Year-to-Date Summary</option>
            </select>
          </div>
          <div>
            <div className="section-label">Month</div>
            <select value={selMonth} onChange={e=>setSelMonth(e.target.value)} className="inp">
              <option value="all">All Months</option>
              {months.map(m=><option key={m}>{m}</option>)}
            </select>
          </div>
          <div>
            <div className="section-label">ASM</div>
            <select value={selArea} onChange={e=>setSelArea(e.target.value)} className="inp">
              <option value="all">All ASMs</option>
              {ASM_LIST.map(a=><option key={a}>{a}</option>)}
            </select>
          </div>
          <div>
            <div className="section-label">HQ</div>
            <select value={selHQ} onChange={e=>setSelHQ(e.target.value)} className="inp">
              <option value="all">All HQs</option>
              {hqs.map(h=><option key={h}>{h}</option>)}
            </select>
          </div>
        </div>

        {repType === "summary" && (
          <div className="flex gap-4 flex-wrap mb-4">
            <label className="flex items-center gap-2 cursor-pointer text-sm">
              <input type="checkbox" checked={inclPlan} onChange={e=>setInclPlan(e.target.checked)} className="w-4 h-4 accent-blue-600"/>
              Include Gift Plan
            </label>
            <label className="flex items-center gap-2 cursor-pointer text-sm">
              <input type="checkbox" checked={inclActual} onChange={e=>setInclActual(e.target.checked)} className="w-4 h-4 accent-blue-600"/>
              Include Gift Actual
            </label>
            <label className="flex items-center gap-2 cursor-pointer text-sm">
              <input type="checkbox" checked={inclProdDet} onChange={e=>setInclProdDet(e.target.checked)} className="w-4 h-4 accent-blue-600"/>

            <div>
              <select value={groupBy} onChange={e=>setGroupBy(e.target.value)} className="inp" style={{maxWidth:160}}>

                <option value="area">Area-wise</option>
                <option value="hq">HQ-wise</option>
                <option value="month">Month-wise</option>

            let csv = "Month,ASM,HQ,Doctor,Speciality,Gift,Gift MRP,CRM,Status,Plan Sales,Actual Sales,ROI\n";

                const as = g.issued ? (g.crmType==="CRM"?(g.giftActualSales||g.actualSales||[]).reduce((s,r)=>s+Number(r.amt||0),0):(g.actualSales||[]).reduce((s,r)=>s+Number(r.amt||0),0)) : 0;

                    <td className="text-xs">{g.hqName}</td>
                    <td className="font-semibold">{g.doctorName}</td>
                    <td className="text-xs">{g.giftName}</td>
                    <td className="mono text-xs">{fmt(g.giftMrp)}</td>
                    <td><span className={`badge ${g.issued?"issued-chip":"pending-chip"}`}>{g.issued?"✓ Issued":"⏳"}</span></td>
                    <td className="mono text-xs">{ps>0?fmt(ps):"—"}</td>
                    <td className="mono text-xs">{as>0?fmt(as):"—"}</td>
                    <td>{(()=>{ const rc=roiClass(roi); return rc?<span style={{fontWeight:800,color:rc.color,fontSize:11}}>{Number(roi).toFixed(2)}x<br/><span style={{fontSize:9}}>{rc.label}</span></span>:<span className="text-gray-300 text-xs">—</span>; })()}</td>
                  </tr>
                );
              {inclProdDet && filtered.slice(0,20).map(g=>(
                ((g.planSales||[]).some(r=>r.prod)||(g.issued&&(g.actualSales||[]).some(r=>r.prod))) ? (
                  <tr key={g.id+"_det"} style={{background:"#f8fafc"}}>
                    <td colSpan={10} style={{padding:"5px 14px"}}>
                      {(g.planSales||[]).filter(r=>r.prod).length>0 && (
                        <div style={{fontSize:11,color:"#64748b",marginBottom:2}}>
                          <strong style={{color:"#2563eb"}}>Plan: </strong>
                          {(g.planSales||[]).filter(r=>r.prod).map((r,i)=><span key={i} style={{marginRight:10}}>{r.prod} ×{r.qty||0} = {fmt(r.amt||0)}</span>)}
                        </div>
                      )}
                      {g.issued && (g.actualSales||[]).filter(r=>r.prod).length>0 && (
                        <div style={{fontSize:11,color:"#64748b"}}>
                          <strong style={{color:"#16a34a"}}>Actual: </strong>
                          {(g.actualSales||[]).filter(r=>r.prod).map((r,i)=><span key={i} style={{marginRight:10}}>{r.prod} ×{r.qty||0} = {fmt(r.amt||0)}</span>)}
                        </div>
                      )}
                    </td>
                  </tr>
                ) : null
              ))}
              })}
            </tbody>
          </table>
          {filtered.length > 20 && <div className="text-center py-3 text-xs text-gray-400">Showing 20 of {filtered.length} records — click Open PDF for full report</div>}
          {filtered.length === 0 && <div className="text-center py-10 text-gray-300 text-sm">No records match filter</div>}
        </div>
      </div>
    </div>
  );
}

   SHARE / WHATSAPP CARD GENERATOR

async function generateShareCard(gifts, title, subtitle, extraContext, treeData) {
  const issued  = gifts.filter(g=>g.issued);
  const pending = gifts.filter(g=>!g.issued);
  const planAmt   = gifts.reduce((s,g)=>s+Number(g.giftMrp||0),0);
  const actAmt    = issued.reduce((s,g)=>s+Number(g.giftMrp||0),0);
  const planSales = gifts.reduce((s,g)=>s+(g.planSales?.reduce((a,r)=>a+Number(r.amt||0),0)||0),0);
  const actSales  = issued.reduce((s,g)=>s+(g.actualSales?.reduce((a,r)=>a+Number(r.amt||0),0)||0),0);
  const roi = actAmt>0&&actSales>0?(actSales/actAmt).toFixed(2):null;
  const pct = gifts.length>0?Math.round(issued.length/gifts.length*100):0;
  const roiLbl = roi?(Number(roi)<3?"Poor":Number(roi)<4?"Average":Number(roi)<5?"Good":"Excellent"):"—";
  const roiCol = roi?(Number(roi)<3?"#dc2626":Number(roi)<4?"#d97706":Number(roi)<5?"#2563eb":"#16a34a"):"#94a3b8";
  const level = extraContext||"rsm";
  const dateStr = new Date().toLocaleDateString("en-IN",{day:"numeric",month:"long",year:"numeric"});

  // ── Build tree data ──
  // RSM level: ASM rows, each ASM → HQ rows, each HQ → doctor rows
  const buildTree = () => {
    return ASM_LIST.map(asm => {
      const ag = gifts.filter(g=>g.asmName===asm);
      if(!ag.length) return null;
      const ai = ag.filter(g=>g.issued);
      const aActSales = ai.reduce((s,g)=>s+(g.actualSales?.reduce((a,r)=>a+Number(r.amt||0),0)||0),0);
      const aActAmt   = ai.reduce((s,g)=>s+Number(g.giftMrp||0),0);
      const aRoi = aActAmt>0&&aActSales>0?(aActSales/aActAmt).toFixed(2):null;
      const aRoiLbl = aRoi?(Number(aRoi)<3?"Poor":Number(aRoi)<4?"Avg":Number(aRoi)<5?"Good":"Excellent"):"—";
      const aRoiCol = aRoi?(Number(aRoi)<3?"#dc2626":Number(aRoi)<4?"#d97706":Number(aRoi)<5?"#2563eb":"#16a34a"):"#94a3b8";
      // HQs under this ASM
      const hqMap = {};
      ag.forEach(g=>{
        const h=g.hqName||"(No HQ)";
        if(!hqMap[h]) hqMap[h]={gifts:[],planned:0,issued:0,planAmt:0,actSales:0};
        hqMap[h].gifts.push(g); hqMap[h].planned++;
        hqMap[h].planAmt+=Number(g.giftMrp||0);
        if(g.issued){hqMap[h].issued++;hqMap[h].actSales+=(g.actualSales||[]).reduce((s,r)=>s+Number(r.amt||0),0);}
      });
      const hqs = Object.entries(hqMap).map(([hq,h])=>({
        hq, ...h, pending:h.planned-h.issued,
        doctors: h.gifts.map(g=>({name:g.doctorName,gift:g.giftName,mrp:Number(g.giftMrp||0),month:g.month,status:g.issued?"✓ Issued":"⏳ Pending",actSales:(g.actualSales||[]).reduce((s,r)=>s+Number(r.amt||0),0)}))
      }));
      return {asm, planned:ag.length, issued:ai.length, pending:ag.length-ai.length,
              planAmt:ag.reduce((s,g)=>s+Number(g.giftMrp||0),0), actSales:aActSales,
              roi:aRoi, roiLbl:aRoiLbl, roiCol:aRoiCol, hqs};
    }).filter(Boolean);
  };
  const tree = buildTree();

  // Label for card based on level
  const levelLabel = level==="rsm"||!level ? "RSM Bihar — Full Summary" :
                     level==="asm"  ? (title||"ASM Summary") :
                     level==="hq"   ? (title||"HQ Summary") :
                     level==="pending" ? "Pending Entries" : title;

    ctx.font=`${weight} ${size}px Arial,sans-serif`;
    ctx.fillStyle=color; ctx.textAlign=align||"left";
    let t=String(text||"");
    if(maxW){while(ctx.measureText(t).width>maxW&&t.length>2)t=t.slice(0,-1);if(t!==String(text||""))t=t.slice(0,-1)+"…";}
    ctx.fillText(t,x,y); ctx.textAlign="left";
  };
  const rect = (ctx,x,y,w,h,color,r=0) => {
    ctx.fillStyle=color;
    if(r){ctx.beginPath();ctx.roundRect(x,y,w,h,r);ctx.fill();}
    else ctx.fillRect(x,y,w,h);
  };
  const hline = (ctx,y,color="#e2e8f0",w=1) => {

  // ── KPI STRIP ──
  const kpis=[
    {l:"Planned",v:String(gifts.length),c:"#1e3a5f",bg:"#eff6ff"},
    {l:"Issued",  v:String(issued.length),c:"#16a34a",bg:"#f0fdf4"},

  ];
  const kW=W/kpis.length;
  kpis.forEach((k,i)=>{
    rect(ctx,i*kW,y,kW,64,k.bg);
    if(i>0){ctx.strokeStyle="#e2e8f0";ctx.lineWidth=1;ctx.beginPath();ctx.moveTo(i*kW,y);ctx.lineTo(i*kW,y+64);ctx.stroke();}

  rect(ctx,0,y,W,40,"#ffffff");

  hline(ctx,y+40); y+=40;

  // ── TREE TABLE ──
  const drawSectionHeader = (label,bgColor="#f1f5f9",textColor="#475569") => {
    rect(ctx,0,y,W,22,bgColor);
    tf(ctx,label,10,y+15,9,"800",textColor);
    y+=22;
  };
  const drawHeader = (cols) => {
    rect(ctx,0,y,W,26,"#1e3a5f");
    let cx=8;
    cols.forEach(([lbl,w,align])=>{
      tf(ctx,lbl.toUpperCase(),align==="right"?cx+w-4:cx,y+18,8,"800","#ffffff",align||"left");
      cx+=w;
    });
    y+=26;
  };
  const drawRow = (cols,vals,stripe) => {
    rect(ctx,0,y,W,32,stripe?"#f8fafc":"#ffffff");
    hline(ctx,y+32,"#f1f5f9",0.5);
    let cx=8;
    cols.forEach(([_,w,align],i)=>{
      const v=vals[i]||{};
      tf(ctx,v._txt||"",align==="right"?cx+w-4:cx,y+21,11,v._bold?"700":"500",v._col||"#374151",align||"left",w-6);
      cx+=w;
    });
    y+=32;
  };
  const drawSubHeader = (label,indent,bgColor) => {
    rect(ctx,0,y,W,26,bgColor||"#f0f4f8");
    hline(ctx,y+26,"#e2e8f0",0.5);
    tf(ctx,label,indent||8,y+18,10,"800","#1e3a5f");
    y+=26;
  };

  if(level==="rsm"||!level) {
    // Full tree: RSM → ASM → HQ → Doctors
    drawSectionHeader("RSM Bihar — Complete Breakdown","#1e3a5f","#ffffff");
    tree.forEach((a,ai)=>{
      // ASM header row
      rect(ctx,0,y,W,30,"#dbeafe");
      hline(ctx,y+30,"#bfdbfe",0.5);
      tf(ctx,"▸ "+a.asm,10,y+21,12,"900","#1e3a5f");
      tf(ctx,"Planned: "+a.planned+"  Issued: "+a.issued+"  Pending: "+a.pending,320,y+21,10,"600","#475569");
      tf(ctx,a.roi?a.roi+"x "+a.roiLbl:"—",W-10,y+21,11,"800",a.roiCol||"#94a3b8","right");
      y+=30;
      // HQs under ASM
      a.hqs.forEach((h,hi)=>{
        rect(ctx,0,y,W,28,"#f0fdf4");
        hline(ctx,y+28,"#d1fae5",0.5);
        tf(ctx,"  ▸ "+h.hq,20,y+20,11,"700","#065f46");
        tf(ctx,"Planned: "+h.planned+"  Issued: "+h.issued+"  Pending: "+h.pending,320,y+20,10,"600","#64748b");
        tf(ctx,fmtN(h.planAmt),W-10,y+20,10,"700","#7c3aed","right");
        y+=28;
        // Doctors under HQ
        h.doctors.forEach((d,di)=>{
          rect(ctx,0,y,W,28,di%2===0?"#ffffff":"#f8fafc");
          hline(ctx,y+28,"#f1f5f9",0.5);
          tf(ctx,"      "+d.name,30,y+20,10,"600","#374151",undefined,220);
          tf(ctx,d.gift,260,y+20,10,"500","#64748b",undefined,200);
          tf(ctx,d.month,470,y+20,10,"500","#94a3b8",undefined,80);
          tf(ctx,d.status,560,y+20,10,"700",d.status.includes("Issued")?"#16a34a":"#d97706",undefined,110);
          tf(ctx,fmtN(d.mrp),W-10,y+20,10,"700","#7c3aed","right");
          y+=28;
        });
      });
      // Gap between ASMs
      if(ai<tree.length-1){ rect(ctx,0,y,W,6,"#e2e8f0"); y+=6; }
    });

  } else if(level==="asm") {
    // ASM level: show HQs + doctors under each HQ
    const myAsm = tree.find(a=>a.asm===title.split(" — ")[0])||tree[0];
    if(myAsm){
      drawSectionHeader(myAsm.asm+" — HQ Breakdown","#dbeafe","#1e3a5f");

        rect(ctx,0,y,W,30,"#f0fdf4");
        hline(ctx,y+30,"#d1fae5",0.5);
        tf(ctx,"▸ "+h.hq,10,y+21,12,"900","#065f46");
        tf(ctx,"Planned: "+h.planned+"  Issued: "+h.issued+"  Pending: "+h.pending,280,y+21,10,"600","#475569");
        tf(ctx,fmtN(h.planAmt),W-10,y+21,11,"700","#7c3aed","right");
        y+=30;
        h.doctors.forEach((d,di)=>{
          rect(ctx,0,y,W,28,di%2===0?"#ffffff":"#f8fafc");
          hline(ctx,y+28,"#f1f5f9",0.5);

      });

      tf(ctx,"▸ "+asm,10,y+20,12,"900","#92400e");
      tf(ctx,asmP.length+" pending  "+fmtN(asmP.reduce((s,g)=>s+Number(g.giftMrp||0),0)),320,y+20,10,"700","#b45309");

      const hqMap={};
      asmP.forEach(g=>{const h=g.hqName||"(No HQ)";if(!hqMap[h])hqMap[h]=[];hqMap[h].push(g);});

        gs.forEach((g,gi)=>{
          rect(ctx,0,y,W,26,gi%2===0?"#ffffff":"#fff7ed");
          hline(ctx,y+26,"#f1f5f9",0.5);
          tf(ctx,"    "+g.doctorName,30,y+19,10,"700","#374151",undefined,220);
          tf(ctx,g.giftName,240,y+19,10,"500","#64748b",undefined,260);
          tf(ctx,g.month,510,y+19,10,"500","#94a3b8",undefined,120);
          tf(ctx,fmtN(g.giftMrp),W-10,y+19,10,"700","#7c3aed","right");
          y+=26;
        });
      });
      rect(ctx,0,y,W,4,"#e2e8f0"); y+=4;
    });
  }

  y+=4;

  // ── FOOTER ──
  if(pending.length>0 && level!=="pending"){
    rect(ctx,0,y,W,32,"#fffbeb"); hline(ctx,y,"#fde68a",1);
    tf(ctx,"⏳  "+pending.length+" gifts pending actual entry",14,y+21,10,"700","#92400e");
    const chips=ASM_LIST.map(a=>{const n=pending.filter(g=>g.asmName===a).length;return n>0?a+": "+n:null;}).filter(Boolean).join("   ");
    tf(ctx,chips,W-12,y+21,9,"600","#b45309","right");
    y+=32;
  }
  rect(ctx,0,y,W,38,"#f8fafc"); hline(ctx,y,"#e2e8f0",1);
  tf(ctx,"GiftTrack v1.8  ·  gifts.aldancare.com  ·  "+dateStr,W/2,y+24,9,"600","#94a3b8","center");
  y+=38;

  // ── Crop and export ──
  const out = document.createElement("canvas");
  out.width=W*2; out.height=y*2;
  const oCtx=out.getContext("2d");
  oCtx.drawImage(canvas,0,0,W*2,y*2,0,0,W*2,y*2);

  const dataUrl=out.toDataURL("image/png");
  const fname="GiftTrack_"+(title||"Report").replace(/[^a-z0-9]/gi,"_")+".png";
  const isIOS=/iPad|iPhone|iPod/.test(navigator.userAgent);
  if(isIOS){
    const win=window.open("","_blank");
    win.document.write(`<html><head><meta name="viewport" content="width=device-width"></head><body style="margin:0;background:#0f172a;display:flex;flex-direction:column;align-items:center;padding:16px"><img src="${dataUrl}" style="max-width:100%;border-radius:8px"><p style="color:rgba(255,255,255,0.4);font-family:sans-serif;text-align:center;font-size:12px;margin-top:12px">Long press → Save to Photos or Share</p></body></html>`);
  } else {
    const a=document.createElement("a"); a.href=dataUrl; a.download=fname; a.click();
  }
}


/* ══════════════════════════════════
   MAIN APP
══════════════════════════════════ */
function App() {
  const [data, setData] = useState(null);
  const [loaded, setLoaded] = useState(false);
  const [syncSt, setSyncSt] = useState("connecting");
  const [activeTab, setActiveTab] = useState("dashboard");
  const [toast, setToast] = useState(null);
  const [confirm, setConfirm] = useState(null);
  const [sharing, setSharing] = useState(false);

  const notify = (msg, color="green") => {
    setToast({ msg, color });
    setTimeout(() => setToast(null), 2800);
  };

  /* ── Firebase ── */
  useEffect(() => {
    const ref = DB.ref(PATH);
    ref.on("value", snap => {
      const raw = snap.val();
      if (raw === null) {
        ref.set(SEED_STATE).catch(console.error);
      } else {
        setData({
          products:  toArr(raw.products).filter(Boolean),
          doctors:   toArr(raw.doctors).filter(Boolean),
          gifts:     toArr(raw.gifts).filter(Boolean),
          giftItems: toArr(raw.giftItems).filter(Boolean),
        });
        setLoaded(true);
        setSyncSt("synced");
      }
    }, err => { console.error(err); setSyncSt("error"); setLoaded(true); });
    return () => ref.off();
  }, []);

  const save = (next) => {
    setSyncSt("saving");
    DB.ref(PATH).set(next)
      .then(() => setSyncSt("synced"))
      .catch(e => { console.error(e); setSyncSt("error"); });
  };

  if (!data) {
    if (!loaded) return (
      <div style={{ minHeight: "100vh", display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center", gap: 16, background: "#f0f4f8" }}>
        <div style={{ fontSize: 48 }} className="spin">🎁</div>
        <p style={{ fontWeight: 800, color: "#1e3a5f", fontSize: 18 }}>Loading GiftTrack…</p>
      </div>
    );
    return null;
  }

  /* ── CRUD ── */
  // Products
  const addProduct    = p => save({ ...data, products: [...data.products, p] });
  const editProduct   = p => save({ ...data, products: data.products.map(x => x.id===p.id ? p : x) });
  const deleteProduct = id => save({ ...data, products: data.products.filter(x => x.id!==id) });

  // Doctors
  const addDoctor    = d => { save({ ...data, doctors: [...(data.doctors||[]), d] }); notify("Doctor added!"); };
  const editDoctor   = d => { const exists=(data.doctors||[]).some(x=>x.id===d.id); const next=exists?(data.doctors||[]).map(x=>x.id===d.id?d:x):[...(data.doctors||[]),d]; save({...data,doctors:next}); notify("Doctor updated!"); };
  const bulkAddGifts = (entries) => { save({...data, gifts:[...(data.gifts||[]), ...entries]}); };
  const deleteDoctor = id => { save({ ...data, doctors: (data.doctors||[]).filter(x=>x.id!==id) }); notify("Deleted","red"); };

  // Gift Items (master)
  const addGiftItem    = g => { save({ ...data, giftItems: [...(data.giftItems||[]), g] }); notify("Gift item added!"); };
  const editGiftItem   = g => { save({ ...data, giftItems: (data.giftItems||[]).map(x => x.id===g.id ? g : x) }); notify("Gift item updated!"); };
  const deleteGiftItem = id => { save({ ...data, giftItems: (data.giftItems||[]).filter(x => x.id!==id) }); notify("Deleted","red"); };

  // Gifts
  const saveGift   = g => {
    const exists = data.gifts.find(x => x.id===g.id);
    const nextGifts = exists ? data.gifts.map(x => x.id===g.id ? g : x) : [...data.gifts, g];
    save({ ...data, gifts: nextGifts });
    notify(exists ? "Gift entry updated!" : "Gift entry saved!");
  };
  const deleteGift = id => {
    save({ ...data, gifts: data.gifts.filter(x => x.id!==id) });
    notify("Deleted", "red");
  };

  const handleShare = async (type, gifts, label, level, treeData) => {
    setSharing(true);
    notify("Generating image…", "amber");
    try {
      await generateShareCard(gifts, label || "Gift Summary", type === "dashboard" ? "Full Dashboard" : null, level, treeData);
      notify("✅ Image ready!");
    } catch (e) {
      console.error(e);
      notify("Image failed", "red");
    } finally {
      setSharing(false);
    }
  };

  const TABS = [
    { id: "dashboard",   label: "Dashboard",  icon: "📊" },
    { id: "gifts",       label: "Gifts",      icon: "🎁" },
    { id: "giftmaster",  label: "Gift Master", icon: "🎀" },
    { id: "doctors",     label: "Doctors",    icon: "👨‍⚕️" },
    { id: "products",    label: "Products",   icon: "📦" },
    { id: "reports",     label: "Reports",    icon: "📋" },
  ];

  return (
    <div style={{ minHeight: "100vh", background: "#f0f4f8" }}>
      <Toast {...(toast || {})} />
      <Confirm open={!!confirm} msg={confirm?.msg} onOk={confirm?.onOk} onCancel={() => setConfirm(null)} />

      {/* ── TOP NAV — Groww-style white bar ── */}

          </div>
          {/* App name + divider */}
          <div style={{ display: "flex", alignItems: "center", gap: 10, marginRight: 28 }}>
            <div style={{ width: 1, height: 28, background: "#e2e8f0" }} className="desktop-nav"></div>
            <div>
              <div style={{ fontWeight: 900, fontSize: 15, color: "#1e3a5f", lineHeight: 1.1 }}>GiftTrack</div>
              <div style={{ fontSize: 9, color: "#94a3b8", textTransform: "uppercase", letterSpacing: 2, fontWeight: 700 }}>v1.8 · Apr 2026</div>
            </div>
          </div>
          {/* Desktop nav tabs */}
          <div style={{ display: "flex", gap: 2, flex: 1 }} className="desktop-nav">
            {TABS.map(t => (
              <button key={t.id} onClick={() => setActiveTab(t.id)}
                style={{
                  padding: "8px 14px", borderRadius: 10, border: "none", cursor: "pointer",
                  fontWeight: 700, fontSize: 12, whiteSpace: "nowrap", fontFamily: "'DM Sans', sans-serif",
                  background: activeTab===t.id ? "#eff6ff" : "transparent",
                  color: activeTab===t.id ? "#2563eb" : "#64748b",
                  borderBottom: activeTab===t.id ? "2px solid #2563eb" : "2px solid transparent",
                  transition: "all 0.15s", borderRadius: 0,
                }}>
                {t.icon} {t.label}
              </button>
            ))}
          </div>
          {/* Status */}
          <div style={{ display: "flex", alignItems: "center", gap: 8, marginLeft: "auto" }}>
            {sharing && <span style={{ fontSize: 11, color: "#2563eb", fontWeight: 800 }} className="spin">⟳</span>}
            <span style={{
              fontSize: 10, padding: "3px 10px", borderRadius: 20, fontWeight: 800, flexShrink: 0,
              background: syncSt==="synced" ? "#f0fdf4" : syncSt==="saving" ? "#fffbeb" : "#fef2f2",
              color: syncSt==="synced" ? "#16a34a" : syncSt==="saving" ? "#d97706" : "#dc2626",
              border: `1px solid ${syncSt==="synced"?"#bbf7d0":syncSt==="saving"?"#fde68a":"#fecaca"}`,
            }}>
              {syncSt==="synced" ? "● Live" : syncSt==="saving" ? "⟳ Saving" : "✕ Error"}
            </span>
          </div>
        </div>
      </nav>

      {/* ── CONTENT ── */}
      <div style={{ maxWidth: 1400, margin: "0 auto", padding: "20px 16px 90px 16px" }}>
        {activeTab === "dashboard" && <Dashboard gifts={data.gifts} onShare={handleShare}/>}
        {activeTab === "gifts" && (
          <GiftsTable gifts={data.gifts} products={data.products} giftItems={data.giftItems||[]} doctors={data.doctors||[]}
           <GiftsTable gifts={data.gifts} products={data.products} giftItems={data.giftItems||[]} doctors={data.doctors||[]}
             onEdit={saveGift} onDelete={deleteGift} onIssue={saveGift} onBulkAdd={bulkAddGifts} notify={notify}/>
        {activeTab === "giftmaster" && <GiftMaster giftItems={data.giftItems||[]} onAdd={addGiftItem} onEdit={editGiftItem} onDelete={deleteGiftItem}/>}
        {activeTab === "doctors" && <DoctorMaster gifts={data.gifts} doctors={data.doctors||[]} onAdd={addDoctor} onEdit={editDoctor} onDelete={deleteDoctor}/>}
        {activeTab === "products" && (
          <ProductMaster products={data.products}
            onAdd={addProduct} onEdit={editProduct} onDelete={deleteProduct}/>
        )}
        {activeTab === "reports" && <Reports gifts={data.gifts} products={data.products}/>}
      </div>

      {/* ── QUICK ADD FLOATING BUTTON ── */}
      <button
        onClick={()=>{ setActiveTab("gifts"); setTimeout(()=>document.getElementById("quick-add-gifts-btn")?.click(),100); }}
        style={{position:"fixed",bottom:80,right:16,zIndex:42,width:52,height:52,borderRadius:"50%",background:"linear-gradient(135deg,#1e3a5f,#2563eb)",color:"white",border:"none",boxShadow:"0 4px 16px rgba(37,99,235,0.4)",cursor:"pointer",fontSize:24,display:"flex",alignItems:"center",justifyContent:"center",fontFamily:"inherit"}}
        title="Add New Gift Entry">
        +
      </button>

      {/* ── MOBILE BOTTOM NAV ── */}
      <div className="mobile-bottom-nav">
        {TABS.map(t => (
          <button key={t.id} onClick={() => setActiveTab(t.id)}
            style={{
              flex: 1, display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center",
              gap: 3, border: "none", background: "none", cursor: "pointer", padding: "8px 4px",
              fontFamily: "'DM Sans', sans-serif",
              color: activeTab===t.id ? "#2563eb" : "#94a3b8",
              transition: "color 0.15s",
            }}>
            <span style={{ fontSize: 20, lineHeight: 1 }}>{t.icon}</span>
            <span style={{ fontSize: 10, fontWeight: activeTab===t.id ? 800 : 600, letterSpacing: 0.2 }}>{t.label}</span>
            {activeTab===t.id && <div style={{ width: 20, height: 3, borderRadius: 2, background: "#2563eb", marginTop: 1 }}/>}
          </button>
        ))}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
