};

/* ── Gift-only ROI for CRM vs Non-CRM ── */
const calcRoi = (g) => {
  const mrp = Number(g.giftMrp||0);
  if (!mrp) return null;
  let actSalesVal = 0;
  if (g.crmType === "CRM") {
    actSalesVal = (g.giftActualSales||g.actualSales||[]).reduce((s,r)=>s+Number(r.amt||0),0);
  } else {
    actSalesVal = (g.actualSales||[]).reduce((s,r)=>s+Number(r.amt||0),0);
  }
  if (!actSalesVal) return null;
  return (actSalesVal / mrp).toFixed(2);
};

/* ── ROI Classification ── */
const roiClass = (roi) => {
  const r = Number(roi);
  if (!roi || isNaN(r) || r <= 0) return null;
  if (r < 3)  return { label: "Poor",      color: "#dc2626", bg: "#fef2f2", border: "#fecaca" };
  if (r < 4)  return { label: "Average",   color: "#d97706", bg: "#fffbeb", border: "#fde68a" };
  if (r < 5)  return { label: "Good",      color: "#2563eb", bg: "#eff6ff", border: "#bfdbfe" };
  return       { label: "Excellent", color: "#16a34a", bg: "#f0fdf4", border: "#bbf7d0" };
};
const roiTag = (roi) => {
  const rc = roiClass(roi);
  if (!rc) return null;
  return `${Number(roi).toFixed(2)}x — ${rc.label}`;
};

/* ══════════════════════════════════

══════════════════════════════════ */
function Fld({ label, children, half, third }) {
  return (
    <div className={half ? "col-span-1" : third ? "col-span-1" : "col-span-2"}>

/* ══════════════════════════════════
   SALES ROWS COMPONENT
══════════════════════════════════ */
function SalesRows({ rows, onChange, products, label }) {
  const update = (idx, field, val) => {
    const next = rows.map((r, i) => {
      if (i !== idx) return r;
      const updated = { ...r, [field]: val };
      if (field === "qty" || field === "ptr") {
        updated.amt = (Number(updated.qty || 0) * Number(updated.ptr || 0)).toFixed(2);
      }
      if (field === "prod") {
        const p = products.find(p => p.name === val);
        if (p) { updated.ptr = p.ptr; updated.amt = (Number(updated.qty || 0) * p.ptr).toFixed(2); }
      }
      return updated;
    });
    onChange(next);
  };
  const add = () => onChange([...rows, { id: uid(), prod: "", qty: "", ptr: "", amt: "" }]);
  const rem = idx => onChange(rows.filter((_, i) => i !== idx));
  const total = rows.reduce((s, r) => s + Number(r.amt || 0), 0);

  return (
    <div>
      <div className="flex justify-between items-center mb-2">
        <div className="section-label">{label}</div>
        <button type="button" onClick={add} className="text-xs font-bold text-blue-600 hover:text-blue-800">+ Add Row</button>
      </div>
      <div className="rounded-xl border border-gray-100" style={{overflowX:"auto"}}>
        <table style={{width:"100%",borderCollapse:"collapse",fontSize:12}}>
          <thead><tr style={{background:"#1e3a5f"}}>
            <th style={{color:"white",padding:"8px 6px",textAlign:"left",fontWeight:700,fontSize:11,minWidth:140}}>Product</th>
            <th style={{color:"white",padding:"8px 4px",textAlign:"left",fontWeight:700,fontSize:11,width:52}}>Qty</th>
            <th style={{color:"white",padding:"8px 4px",textAlign:"left",fontWeight:700,fontSize:11,width:72}}>PTR(₹)</th>
            <th style={{color:"white",padding:"8px 6px",textAlign:"left",fontWeight:700,fontSize:11,width:80}}>Amt(₹)</th>
            <th style={{width:24}}></th>
          </tr></thead>
          <tbody>
            {rows.map((r, i) => (
              <tr key={r.id} style={{borderBottom:"1px solid #f1f5f9"}}>
                <td style={{padding:"4px 6px"}}>
                  <select value={r.prod} onChange={e => update(i, "prod", e.target.value)} style={{width:"100%",padding:"5px 4px",border:"1.5px solid #e2e8f0",borderRadius:8,fontSize:12,fontFamily:"inherit",outline:"none",background:"white"}}>
                    <option value="">— Product —</option>
                    {products.map(p => <option key={p.id}>{p.name}</option>)}
                    <option value="Other">Other</option>
                  </select>
                </td>
                <td style={{padding:"4px 3px"}}><input type="number" value={r.qty} onChange={e => update(i, "qty", e.target.value)} style={{width:48,padding:"5px 4px",border:"1.5px solid #e2e8f0",borderRadius:8,fontSize:12,fontFamily:"inherit",outline:"none"}} placeholder="0"/></td>
                <td style={{padding:"4px 3px"}}><input type="number" value={r.ptr} onChange={e => update(i, "ptr", e.target.value)} style={{width:68,padding:"5px 4px",border:"1.5px solid #e2e8f0",borderRadius:8,fontSize:12,fontFamily:"inherit",outline:"none"}} placeholder="0.00"/></td>
                <td style={{padding:"4px 6px",fontWeight:800,color:"#4338ca",fontFamily:"monospace",fontSize:12}}>{r.amt ? fmt(r.amt) : "—"}</td>
                <td style={{padding:"4px 2px"}}>{rows.length > 1 && <button type="button" onClick={() => rem(i)} style={{color:"#fca5a5",border:"none",background:"none",cursor:"pointer",fontWeight:900,fontSize:13}}>✕</button>}</td>

}

/* ══════════════════════════════════

══════════════════════════════════ */
function Toast({ msg, color }) {
  if (!msg) return null;
  const bg = color === "red" ? "#dc2626" : color === "amber" ? "#d97706" : "#059669";
  return (
    <div style={{ position: "fixed", top: 16, right: 16, zIndex: 9999, background: bg, color: "white", padding: "10px 20px", borderRadius: 12, fontWeight: 700, fontSize: 13, boxShadow: "0 4px 20px rgba(0,0,0,0.2)" }}>
      {msg}
    </div>
  );
}

/* ══════════════════════════════════
   DOCTOR SEARCH INPUT
══════════════════════════════════ */
function DoctorSearchInput({ value, onChange, onSelect, allDoctors }) {
  const [open, setOpen] = useState(false);
  const [q, setQ] = useState(value||"");
  const ref = useRef();

  useEffect(()=>{ setQ(value||""); },[value]);
  useEffect(()=>{
    const handler = e => { if(ref.current && !ref.current.contains(e.target)) setOpen(false); };
    document.addEventListener("mousedown", handler);
    return ()=>document.removeEventListener("mousedown", handler);
  },[]);

  const filtered = q.trim()
    ? allDoctors.filter(d=>d.name.toLowerCase().includes(q.toLowerCase())).slice(0,8)
    : allDoctors.slice(0,8);

  return (
    <div ref={ref} style={{position:"relative"}}>
      <input
        value={q}
        onChange={e=>{ setQ(e.target.value); onChange(e.target.value); setOpen(true); }}
        onFocus={()=>setOpen(true)}
        className="inp"
        placeholder="Search or type doctor name…"
        autoComplete="off"
      />
      {open && (
        <div style={{position:"absolute",top:"100%",left:0,right:0,background:"white",border:"1.5px solid #e2e8f0",borderRadius:10,boxShadow:"0 8px 24px rgba(0,0,0,0.12)",zIndex:200,maxHeight:220,overflowY:"auto",marginTop:4}}>
          {filtered.length===0 && (
            <div style={{padding:"10px 14px",fontSize:12,color:"#94a3b8"}}>
              No doctor found —&nbsp;
              <span style={{color:"#2563eb",fontWeight:700,cursor:"pointer"}} onClick={()=>{ onSelect({name:q}); setOpen(false); }}>
                use "{q}" as new
              </span>
            </div>
          )}
          {filtered.map(d=>(
            <div key={d.name} onClick={()=>{ onSelect(d); setQ(d.name); setOpen(false); }}
              style={{padding:"10px 14px",cursor:"pointer",borderBottom:"1px solid #f1f5f9",display:"flex",justifyContent:"space-between",alignItems:"center"}}
              onMouseEnter={e=>e.currentTarget.style.background="#f8fafc"}
              onMouseLeave={e=>e.currentTarget.style.background="white"}>
              <div>
                <div style={{fontWeight:700,fontSize:13,color:"#1e293b"}}>{d.name}</div>
                {(d.speciality||d.location) && <div style={{fontSize:11,color:"#94a3b8"}}>{[d.speciality,d.location].filter(Boolean).join(" · ")}</div>}
              </div>
              {d.hqName && <span style={{fontSize:10,background:"#eff6ff",color:"#2563eb",padding:"2px 8px",borderRadius:20,fontWeight:700,flexShrink:0}}>{d.hqName}</span>}
            </div>
          ))}
        </div>
      )}
    </div>
  );
}

/* ══════════════════════════════════

function GiftModal({ open, onClose, onSave, initial, products, doctors, gifts, giftItems }) {
  const [form, setForm] = useState(BG());
  const [tab, setTab] = useState("plan");
  const fileRef = useRef();

  useEffect(() => {
    if (open) {
      setForm(initial ? { ...BG(), ...initial } : BG());
      setTab(initial?._openTab || "plan");
    }
  }, [open, initial]);

  if (!open) return null;

  const set = (k, v) => setForm(f => ({ ...f, [k]: v }));
  const specialities = ["Gynecologist", "Obstetrician", "Endocrinologist", "General Physician", "Infertility Specialist", "Diabetologist", "Other"];
  const giftMrp = Number(form.giftMrp || 0);
  const roi = calcRoi(form);



  const handleSave = () => {
    if (!form.doctorName || !form.giftName || !form.giftMrp || !form.month) return;
    onSave({ ...form, id: form.id || uid(), createdAt: form.createdAt || new Date().toISOString() });
    onClose();
  };

  // Auto-doctor detect — full objects for search
  const knownDocs = (() => {
    const seen = new Set();
    const result = [];
    // from master doctors passed in
    (giftItems||[]).forEach(()=>{}); // noop
    doctors.filter(Boolean).forEach(d=>{ if(!seen.has(d.name)){seen.add(d.name);result.push(d);} });
    // from gift entries
    gifts && toArr(gifts).forEach(g=>{ if(g.doctorName&&!seen.has(g.doctorName)){seen.add(g.doctorName);result.push({name:g.doctorName,speciality:g.speciality,location:g.location,hqName:g.hqName,asmName:g.asmName,mobile:g.doctorMobile});} });
    return result.sort((a,b)=>a.name.localeCompare(b.name));
  })();

  return (
    <div className="modal-overlay">
      <div className="modal-box wide">

                  <div>
                    <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:4}}>
                      <div className="section-label" style={{marginBottom:0}}>🎁 Gift Achieved Sales <span style={{fontSize:9,color:"#2563eb"}}>(used for ROI)</span></div>
                      {(form.giftPlanSales||[]).some(r=>r.prod) && (
                        <button type="button" onClick={()=>set("giftActualSales",(form.giftPlanSales||[]).map(r=>({...r,id:uid()})))}
                          style={{fontSize:11,fontWeight:800,color:"#2563eb",background:"#eff6ff",border:"1px solid #bfdbfe",borderRadius:8,padding:"3px 8px",cursor:"pointer",fontFamily:"inherit"}}>
                          📋 Copy from Plan
                        </button>
                      )}
                    </div>
                    {(form.giftPlanSales||[]).some(r=>r.prod) && (
                      <div style={{background:"#f8fafc",borderRadius:8,padding:"6px 10px",marginBottom:6,fontSize:11}}>
                        <div style={{fontWeight:700,color:"#94a3b8",marginBottom:3}}>📌 Gift Planned</div>
                        {(form.giftPlanSales||[]).filter(r=>r.prod).map((r,i)=>(
                          <div key={i} style={{display:"flex",justifyContent:"space-between",color:"#64748b",padding:"1px 0"}}>
                            <span>{r.prod}</span><span style={{fontWeight:700}}>×{r.qty||0} = {fmt(r.amt||0)}</span>
                          </div>
                        ))}
                      </div>
                    )}
                    <SalesRows rows={form.giftActualSales||[{id:uid(),prod:"",qty:"",ptr:"",amt:""}]} onChange={v=>set("giftActualSales",v)} products={products} label=""/>

                </div>
              ) : (
                <div>
                  <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:6}}>
                    <div className="section-label" style={{marginBottom:0}}>📈 Actual Sales</div>
                    {form.planSales&&form.planSales.some(r=>r.prod) && (
                      <button type="button"
                        onClick={()=>set("actualSales", form.planSales.map(r=>({...r, id:uid()})))}
                        style={{fontSize:11,fontWeight:800,color:"#2563eb",background:"#eff6ff",border:"1px solid #bfdbfe",borderRadius:8,padding:"4px 10px",cursor:"pointer",fontFamily:"inherit"}}>
                        📋 Copy from Plan
                      </button>
                    )}
                  </div>
                  {form.planSales&&form.planSales.some(r=>r.prod) && (
                    <div style={{background:"#f8fafc",borderRadius:10,padding:"8px 12px",marginBottom:8,fontSize:11}}>
                      <div style={{fontWeight:700,color:"#94a3b8",marginBottom:4,textTransform:"uppercase",letterSpacing:0.5}}>📌 Planned (reference)</div>
                      {form.planSales.filter(r=>r.prod).map((r,i)=>(
                        <div key={i} style={{display:"flex",justifyContent:"space-between",color:"#64748b",padding:"2px 0",borderBottom:"1px dashed #e2e8f0"}}>
                          <span>{r.prod}</span>
                          <span style={{fontWeight:700}}>Qty:{r.qty||0} × ₹{r.ptr||0} = <strong style={{color:"#4338ca"}}>{fmt(r.amt||0)}</strong></span>

                      ))}
                    </div>
                  )}
                  <SalesRows rows={form.actualSales} onChange={v=>set("actualSales",v)} products={products} label=""/>
                </div>
              )}
              {/* ROI with classification */}
              {roi && (()=>{ const rc=roiClass(roi); return rc?(
                <div style={{borderRadius:12,padding:"14px 16px",textAlign:"center",fontWeight:900,fontSize:22,background:rc.bg,color:rc.color,border:`1px solid ${rc.border}`}}>
                  ROI: {Number(roi).toFixed(2)}x &nbsp;<span style={{fontSize:15,fontWeight:800}}>{rc.label}</span>
                </div>
              ):null; })()}
            </div>
          )}
        </div>
        <div className="flex gap-3 p-5 border-t border-gray-100">
          <button className="btn btn-ghost flex-1" onClick={onClose}>Cancel</button>
          <button className="btn btn-primary flex-1" onClick={handleSave}
            disabled={!form.doctorName||!form.giftName||!form.giftMrp}>
            {form.id ? "Update Entry" : "Save Gift Entry"}
          </button>
        </div>
      </div>
    </div>
  );
}

function ProductModal({ open, onClose, onSave, initial }) {
  const [form, setForm] = useState({ name:"", pack:"", pts:"", ptr:"", mrp:"" });
  useEffect(() => { if (open) setForm(initial || { name:"", pack:"", pts:"", ptr:"", mrp:"" }); }, [open, initial]);
  if (!open) return null;
  const set = (k, v) => setForm(f => ({ ...f, [k]: v }));
  return (
    <div className="modal-overlay">
      <div className="modal-box" style={{ maxWidth: 420 }}>
        <div className="flex justify-between items-center px-5 pt-5 pb-4 border-b border-gray-100">
          <h2 className="font-black text-gray-800">{initial?.id ? "Edit Product" : "Add Product"}</h2>
          <button onClick={onClose} className="text-gray-300 hover:text-gray-700 font-bold text-xl">✕</button>
        </div>
        <div className="p-5 space-y-4">
          <div><div className="section-label">Product Name *</div><input value={form.name} onChange={e=>set("name",e.target.value)} className="inp" placeholder="e.g. MYOLIFE Tabs"/></div>
          <div><div className="section-label">Pack Size</div><input value={form.pack} onChange={e=>set("pack",e.target.value)} className="inp" placeholder="e.g. 1 X 10"/></div>
          <div className="grid grid-cols-3 gap-3">
            <div><div className="section-label">PTS (₹)</div><input type="number" value={form.pts} onChange={e=>set("pts",e.target.value)} className="inp mono" placeholder="0.00"/></div>
            <div><div className="section-label">PTR (₹)</div><input type="number" value={form.ptr} onChange={e=>set("ptr",e.target.value)} className="inp mono" placeholder="0.00"/></div>
            <div><div className="section-label">MRP (₹)</div><input type="number" value={form.mrp} onChange={e=>set("mrp",e.target.value)} className="inp mono" placeholder="0.00"/></div>
          </div>
          <div className="flex gap-3 pt-2">
            <button className="btn btn-ghost flex-1" onClick={onClose}>Cancel</button>
            <button className="btn btn-primary flex-1" onClick={()=>{ if(!form.name) return; onSave({...form,id:initial?.id||uid()}); onClose(); }}>Save Product</button>
          </div>
        </div>
      </div>
    </div>
  );
}


/* ══════════════════════════════════
   GIFT ITEM MODAL (Gift Master add/edit)
══════════════════════════════════ */
function GiftItemModal({ open, onClose, onSave, initial }) {
  const [form, setForm] = useState({ name:"", mrp:"", monthInput:CUR_MONTH_INPUT, photoUrl:"", notes:"" });
  const fileRef = useRef();
  useEffect(() => {
    if (open) {
      if (initial) {
        setForm({...initial, monthInput: monthLabelToInput(initial.month||"")});
      } else {
        setForm({ name:"", mrp:"", monthInput:CUR_MONTH_INPUT, photoUrl:"", notes:"" });
      }
    }
  }, [open, initial]);
  if (!open) return null;
  const set = (k,v) => setForm(f=>({...f,[k]:v}));
  const handlePhoto = (e) => {
    const file = e.target.files[0]; if (!file) return;
    const reader = new FileReader();
    reader.onload = ev => set("photoUrl", ev.target.result);
    reader.readAsDataURL(file);
  };
  return (
    <div className="modal-overlay">
      <div className="modal-box" style={{maxWidth:420}}>
        <div className="flex justify-between items-center px-5 pt-5 pb-4 border-b border-gray-100">
          <h2 className="font-black text-gray-800">{initial?.id ? "✏️ Edit Gift Item" : "🎁 Add Gift Item"}</h2>
          <button onClick={onClose} className="text-gray-300 hover:text-gray-700 font-bold text-xl">✕</button>
        </div>
        <div className="p-5 space-y-4">
          <div><div className="section-label">Gift Name *</div><input value={form.name} onChange={e=>set("name",e.target.value)} className="inp" placeholder="e.g. Diary, Pen Set, Stethoscope" autoFocus/></div>
          <div className="grid grid-cols-2 gap-3">
            <div><div className="section-label">MRP (₹) *</div><input type="number" value={form.mrp} onChange={e=>set("mrp",e.target.value)} className="inp mono" placeholder="0.00"/></div>
            <div><div className="section-label">Month</div><input type="month" value={form.monthInput||CUR_MONTH_INPUT} onChange={e=>set("monthInput",e.target.value)} className="inp mono"/></div>
          </div>
          <div><div className="section-label">Notes / Description</div><input value={form.notes} onChange={e=>set("notes",e.target.value)} className="inp" placeholder="Optional details…"/></div>
          <div>
            <div className="section-label">Gift Photo</div>
            <div className="flex items-center gap-3">
              <input ref={fileRef} type="file" accept="image/*" style={{display:"none"}} onChange={handlePhoto}/>
              <button type="button" className="btn btn-ghost text-xs" onClick={()=>fileRef.current.click()}>📷 Upload Photo</button>
              {form.photoUrl && (
                <div className="relative">
                  <img src={form.photoUrl} alt="gift" style={{width:64,height:64,objectFit:"cover",borderRadius:10,border:"2px solid #e2e8f0"}}/>
                  <button type="button" onClick={()=>set("photoUrl","")} style={{position:"absolute",top:-6,right:-6,background:"#dc2626",color:"white",border:"none",borderRadius:"50%",width:18,height:18,fontSize:10,cursor:"pointer",fontWeight:900}}>✕</button>
                </div>
              )}
            </div>
          </div>
          <div className="flex gap-3 pt-2">
            <button className="btn btn-ghost flex-1" onClick={onClose}>Cancel</button>
            <button className="btn btn-primary flex-1" disabled={!form.name||!form.mrp}
              onClick={()=>{ onSave({...form, mrp:Number(form.mrp), month:monthInputToLabel(form.monthInput||CUR_MONTH_INPUT), id:initial?.id||uid()}); onClose(); }}>
              Save Gift Item
            </button>
          </div>
        </div>
      </div>
    </div>
  );
}

/* ══════════════════════════════════
   GIFT MASTER TAB
══════════════════════════════════ */
function GiftMaster({ giftItems, onAdd, onEdit, onDelete }) {
  const [modal, setModal] = useState(false);
  const [editG, setEditG] = useState(null);
  const [confirm, setConfirm] = useState(null);

  return (
    <div>
      <GiftItemModal open={modal} onClose={()=>{setModal(false);setEditG(null);}} onSave={g=>{ editG?onEdit(g):onAdd(g); }} initial={editG}/>
      <Confirm open={!!confirm} msg="Delete this gift item from master?" onOk={()=>{onDelete(confirm);setConfirm(null);}} onCancel={()=>setConfirm(null)}/>
      <div className="flex justify-between items-center mb-4">
        <div>
          <h2 className="font-black text-gray-800 text-base">🎀 Gift Master ({giftItems.length})</h2>
          <p className="text-xs text-gray-400 mt-0.5">Add gifts here once — reuse them in every gift entry</p>
        </div>
        <button className="btn btn-primary text-xs" onClick={()=>{setEditG(null);setModal(true);}}>+ Add Gift Item</button>
      </div>

      {/* Card grid */}
      {giftItems.length === 0 ? (
        <div className="card p-12 text-center">
          <div style={{fontSize:48,marginBottom:12}}>🎀</div>
          <p className="font-bold text-gray-400">No gift items yet</p>
          <p className="text-xs text-gray-300 mt-1">Add gifts to the master list — they'll be available to pick in every gift entry form</p>
          <button className="btn btn-primary mt-4 text-xs" onClick={()=>setModal(true)}>+ Add First Gift Item</button>
        </div>
      ) : (
        <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(200px,1fr))",gap:14}}>
          {giftItems.map(g => (
            <div key={g.id} className="card" style={{overflow:"hidden",display:"flex",flexDirection:"column"}}>
              {/* Photo area */}
              <div style={{height:140,background:"#f8fafc",display:"flex",alignItems:"center",justifyContent:"center",position:"relative",overflow:"hidden"}}>
                {g.photoUrl
                  ? <img src={g.photoUrl} alt={g.name} style={{width:"100%",height:"100%",objectFit:"cover"}}/>
                  : <span style={{fontSize:48}}>🎁</span>
                }
                {g.month && (
                  <span style={{position:"absolute",top:8,right:8,background:"rgba(30,58,95,0.85)",color:"white",fontSize:9,fontWeight:800,padding:"2px 8px",borderRadius:20,letterSpacing:0.5}}>
                    {g.month}
                  </span>
                )}
              </div>
              {/* Info */}
              <div style={{padding:"12px 14px",flex:1,display:"flex",flexDirection:"column",gap:4}}>
                <div style={{fontWeight:800,fontSize:14,color:"#1e293b",lineHeight:1.3}}>{g.name}</div>
                {g.notes && <div style={{fontSize:11,color:"#94a3b8"}}>{g.notes}</div>}
                <div style={{fontWeight:900,fontSize:16,color:"#2563eb",marginTop:4}} className="mono">₹{Number(g.mrp||0).toLocaleString("en-IN",{minimumFractionDigits:2})}</div>
              </div>
              {/* Actions */}
              <div style={{display:"flex",borderTop:"1px solid #f1f5f9"}}>
                <button onClick={()=>{setEditG(g);setModal(true);}} style={{flex:1,padding:"9px",background:"none",border:"none",cursor:"pointer",fontSize:13,color:"#64748b",fontWeight:700,fontFamily:"inherit"}} className="hover:bg-blue-50 hover:text-blue-600">✏️ Edit</button>
                <div style={{width:1,background:"#f1f5f9"}}/>
                <button onClick={()=>setConfirm(g.id)} style={{flex:1,padding:"9px",background:"none",border:"none",cursor:"pointer",fontSize:13,color:"#94a3b8",fontWeight:700,fontFamily:"inherit"}} className="hover:bg-red-50 hover:text-red-500">🗑️</button>
              </div>
            </div>
          ))}
        </div>
      )}
    </div>
  );
}

function DoctorMaster({ gifts, doctors, onAdd, onEdit, onDelete }) {
  const [modal, setModal] = useState(false);
  const [editD, setEditD] = useState(null);
  const [confirm, setConfirm] = useState(null);
  const [search, setSearch] = useState("");

  // Merge: doctors from master + auto from gift entries (no duplicates by name)
  const fromGifts = [];
  const masterNames = new Set(doctors.map(d=>d.name.toLowerCase()));
  gifts.forEach(g=>{
    if(g.doctorName && !masterNames.has(g.doctorName.toLowerCase())){
      masterNames.add(g.doctorName.toLowerCase());
      fromGifts.push({ id:"gift_"+g.doctorName, name:g.doctorName, speciality:g.speciality||"", location:g.location||"", hqName:g.hqName||"", asmName:g.asmName||"", mobile:g.doctorMobile||"", _fromGift:true });
    }
  });
  const allDocs = [...doctors, ...fromGifts].filter(d=>!search||d.name.toLowerCase().includes(search.toLowerCase())).sort((a,b)=>a.name.localeCompare(b.name));

  return (
    <div>
      <DoctorModal open={modal} onClose={()=>{setModal(false);setEditD(null);}} onSave={d=>{ if(editD?._fromGift){ onAdd({...d,id:uid()}); } else if(editD){ onEdit(d); } else { onAdd(d); } }} initial={editD}/>
      <Confirm open={!!confirm} msg="Remove this doctor from master?" onOk={()=>{onDelete(confirm);setConfirm(null);}} onCancel={()=>setConfirm(null)}/>
      <div className="flex flex-wrap gap-3 items-center mb-4">
        <div>
          <h2 className="font-black text-gray-800 text-base">👨‍⚕️ Doctor Master ({allDocs.length})</h2>
          <p className="text-xs text-gray-400">Auto-populated from gift entries + manually added</p>
        </div>
        <div className="flex-1"/>
        <input value={search} onChange={e=>setSearch(e.target.value)} className="inp" style={{maxWidth:200}} placeholder="🔍 Search doctor…"/>
        <button className="btn btn-primary text-xs" onClick={()=>{setEditD(null);setModal(true);}}>+ Add Doctor</button>
      </div>
      <div className="card overflow-hidden">
        <div className="overflow-x-auto">
          <table className="w-full tbl">
            <thead><tr>
              <th>#</th><th>Doctor Name</th><th>Mobile</th><th>Speciality</th><th>Location</th><th>HQ</th><th>ASM</th><th>Source</th><th></th>
            </tr></thead>
            <tbody>
              {allDocs.map((d,i)=>(
                <tr key={d.id}>
                  <td className="text-gray-400 text-xs">{i+1}</td>
                  <td className="font-bold">{d.name}</td>
                  <td className="text-xs text-gray-500">{d.mobile||"—"}</td>
                  <td><span className="badge bg-blue-100 text-blue-700">{d.speciality||"—"}</span></td>
                  <td className="text-xs">{d.location||"—"}</td>
                  <td className="text-xs">{d.hqName||"—"}</td>
                  <td className="text-xs">{d.asmName||"—"}</td>
                  <td><span className={`badge ${d._fromGift?"bg-amber-100 text-amber-700":"bg-emerald-100 text-emerald-700"}`}>{d._fromGift?"Gift Entry":"Master"}</span></td>
                  <td>
                    <div className="flex gap-2">
                      <button onClick={()=>{setEditD(d._fromGift?{...d,_fromGift:true}:d);setModal(true);}} className="text-blue-300 hover:text-blue-600">✏️</button>
                      {!d._fromGift && <button onClick={()=>setConfirm(d.id)} className="text-gray-200 hover:text-red-500">🗑️</button>}
                    </div>
                  </td>
                </tr>
              ))}
            </tbody>
          </table>
          {allDocs.length===0 && <div className="text-center py-10 text-gray-300 text-sm">No doctors yet</div>}
        </div>
      </div>
    </div>
  );
}

/* ══════════════════════════════════
   COPY MONTH MODAL
══════════════════════════════════ */
function CopyMonthModal({ open, onClose, gifts, onCopy }) {
  const months = [...new Set(gifts.map(g=>g.month).filter(Boolean))].sort();
  const [srcMonth, setSrcMonth] = useState(months[months.length-1]||"");
  const [tgtInput, setTgtInput] = useState(CUR_MONTH_INPUT);
  const [selected, setSelected] = useState({});
  const [copying, setCopying] = useState(false);

  // When source month changes, re-select all doctors in that month
  useEffect(()=>{
    if(!srcMonth) return;
    const srcGifts = gifts.filter(g=>g.month===srcMonth);
    const sel = {};
    srcGifts.forEach(g=>{ sel[g.id]=true; });
    setSelected(sel);
  }, [srcMonth, open]);

  if(!open) return null;

  const srcGifts = gifts.filter(g=>g.month===srcMonth);
  const tgtMonth = monthInputToLabel(tgtInput);
  const existingInTarget = new Set(gifts.filter(g=>g.month===tgtMonth).map(g=>g.doctorName?.toLowerCase()));
  const selectedIds = Object.keys(selected).filter(id=>selected[id]);
  const selectedCount = selectedIds.length;
  const allSelected = srcGifts.length>0 && srcGifts.every(g=>selected[g.id]);

  const toggleAll = () => {
    const sel = {};
    if(!allSelected) srcGifts.forEach(g=>{ sel[g.id]=true; });
    setSelected(sel);
  };

  const toggle = (id) => setSelected(s=>({...s,[id]:!s[id]}));

  const handleCopy = () => {
    if(!selectedCount || !tgtMonth || tgtMonth===srcMonth) return;
    setCopying(true);
    const toCopy = srcGifts.filter(g=>selected[g.id] && !existingInTarget.has(g.doctorName?.toLowerCase()));
    const newEntries = toCopy.map(g=>({
      ...g,
      id: uid(),
      month: tgtMonth,
      issued: false,
      issueDate: "",
      issuedPhotoUrl: "",
      actualSales:    [{id:uid(),prod:"",qty:"",ptr:"",amt:""}],
      crmActualSales: [{id:uid(),prod:"",qty:"",ptr:"",amt:""}],
      giftActualSales:[{id:uid(),prod:"",qty:"",ptr:"",amt:""}],
      createdAt: new Date().toISOString(),
    }));
    onCopy(newEntries, tgtMonth, toCopy.length, selectedCount-toCopy.length);
    setCopying(false);
    onClose();
  };

  const skipped = selectedIds.filter(id=>{
    const g=srcGifts.find(x=>x.id===id);
    return g && existingInTarget.has(g.doctorName?.toLowerCase());
  }).length;

  return (
    <div className="fixed inset-0 z-50 flex items-start justify-center p-4 overflow-y-auto" style={{background:"rgba(15,23,42,0.65)"}}>
      <div className="bg-white rounded-2xl shadow-2xl w-full max-w-lg my-6">
        <div className="flex justify-between items-center px-6 pt-5 pb-4 border-b border-gray-100">
          <h2 className="text-base font-bold text-gray-800">📋 Copy Month Entries</h2>
          <button onClick={onClose} className="text-gray-300 hover:text-gray-700 text-xl font-bold">✕</button>
        </div>
        <div className="px-6 py-5 space-y-4">

          {/* Source + Target */}
          <div className="grid grid-cols-2 gap-3">
            <div>
              <div className="section-label">Source Month</div>
              <select value={srcMonth} onChange={e=>setSrcMonth(e.target.value)} className="inp">
                <option value="">— Select —</option>
                {months.map(m=><option key={m}>{m}</option>)}
              </select>
            </div>
            <div>
              <div className="section-label">Target Month</div>
              <input type="month" value={tgtInput} onChange={e=>setTgtInput(e.target.value)} className="inp mono"/>
            </div>
          </div>

          {tgtMonth && tgtMonth===srcMonth && (
            <div style={{background:"#fef2f2",border:"1px solid #fecaca",borderRadius:8,padding:"8px 12px",fontSize:12,color:"#dc2626",fontWeight:600}}>
              ⚠️ Source and target month are the same. Please choose a different target month.
            </div>
          )}

          {/* Doctor checklist */}
          {srcGifts.length>0 && (
            <div>
              <div className="flex justify-between items-center mb-2">
                <div className="section-label" style={{marginBottom:0}}>{srcGifts.length} doctors in {srcMonth}</div>
                <button onClick={toggleAll} style={{fontSize:11,fontWeight:800,color:"#2563eb",background:"#eff6ff",border:"1px solid #bfdbfe",borderRadius:6,padding:"3px 10px",cursor:"pointer",fontFamily:"inherit"}}>
                  {allSelected?"☑ Deselect All":"☐ Select All"}
                </button>
              </div>
              <div style={{maxHeight:300,overflowY:"auto",border:"1px solid #e5e7eb",borderRadius:10}}>
                {srcGifts.map(g=>{
                  const alreadyExists = existingInTarget.has(g.doctorName?.toLowerCase());
                  return (
                    <label key={g.id} style={{
                      display:"flex",alignItems:"center",gap:10,padding:"8px 12px",
                      borderBottom:"1px solid #f3f4f6",cursor:"pointer",
                      background: alreadyExists?"#f9fafb":"white",
                      opacity: alreadyExists?0.5:1
                    }}>
                      <input type="checkbox" checked={!!selected[g.id]} onChange={()=>toggle(g.id)}
                        className="w-4 h-4 accent-indigo-600" disabled={alreadyExists}/>
                      <div style={{flex:1,minWidth:0}}>
                        <div style={{fontWeight:700,fontSize:13,color:"#1f2937"}}>{g.doctorName}</div>
                        <div style={{fontSize:11,color:"#9ca3af"}}>{g.hqName} · {g.giftName} · {fmt(g.giftMrp)}</div>
                      </div>
                      {alreadyExists && <span style={{fontSize:10,fontWeight:700,color:"#6b7280",background:"#f3f4f6",padding:"2px 6px",borderRadius:4,whiteSpace:"nowrap"}}>Already in {tgtMonth}</span>}
                    </label>
                  );
                })}
              </div>
              {skipped>0 && (
                <div style={{fontSize:11,color:"#92400e",marginTop:6,fontWeight:600}}>
                  ⚠️ {skipped} selected doctor(s) already exist in {tgtMonth} and will be skipped.
                </div>
              )}
            </div>
          )}

          {srcGifts.length===0 && srcMonth && (
            <div className="text-center py-6 text-gray-300 text-sm">No entries in {srcMonth}</div>
          )}

        </div>
        <div className="flex gap-3 px-6 pb-5">
          <button onClick={onClose} className="flex-1 py-2.5 bg-gray-100 text-gray-700 rounded-xl text-sm font-bold hover:bg-gray-200">Cancel</button>
          <button onClick={handleCopy}
            disabled={!selectedCount||!tgtMonth||tgtMonth===srcMonth||copying||(selectedCount-skipped===0)}
            className="flex-1 py-2.5 bg-indigo-600 text-white rounded-xl text-sm font-bold hover:bg-indigo-700 disabled:opacity-40">
            {copying?"Copying…":`📋 Copy ${selectedCount-skipped} Entr${selectedCount-skipped===1?"y":"ies"}`}
          </button>
        </div>
      </div>
    </div>
  );
}
}

function GiftsTable({ gifts, products, giftItems, doctors: data_doctors, onEdit, onDelete, onIssue, onBulkAdd, notify }) {
  const [search, setSearch] = useState("");
  const [fMonth, setFMonth] = useState("all");
  const [fAsm, setFAsm] = useState("all");
  const [fHQ, setFHQ] = useState("all");
  const [fStatus, setFStatus] = useState("all");
  const [fLocation, setFLocation] = useState("all");
  const [modal, setModal] = useState(false);
  const [editG, setEditG] = useState(null);
  const [confirm, setConfirm] = useState(null);
  const [copyModal, setCopyModal] = useState(false);

  const months    = [...new Set(gifts.map(g=>g.month).filter(Boolean))].sort();
  const locations = [...new Set(gifts.map(g=>g.location).filter(Boolean))].sort();

  const filtered = gifts.filter(g => {
    if (fMonth !== "all" && g.month !== fMonth) return false;
    if (fAsm !== "all" && g.asmName !== fAsm) return false;
    if (fHQ !== "all" && g.hqName !== fHQ) return false;
    if (fStatus === "pending" && g.issued) return false;
    if (fStatus === "issued" && !g.issued) return false;
    if (fLocation !== "all" && (g.location||"") !== fLocation) return false;
    if (search && !`${g.doctorName} ${g.hqName} ${g.asmName} ${g.giftName} ${g.location||""} ${g.doctorMobile||""}`.toLowerCase().includes(search.toLowerCase())) return false;
    return true;
  });

  const planTotal = filtered.reduce((s,g)=>s+Number(g.giftMrp||0),0);
  const actTotal  = filtered.filter(g=>g.issued).reduce((s,g)=>s+Number(g.giftMrp||0),0);

  return (
    <div>
      <GiftModal open={modal} onClose={()=>{setModal(false);setEditG(null);}} onSave={g=>editG?onEdit(g):onIssue(g)} initial={editG} products={products} doctors={data_doctors||[]} gifts={gifts} giftItems={giftItems||[]}/>
      <CopyMonthModal open={copyModal} onClose={()=>setCopyModal(false)} gifts={gifts}
        onCopy={(entries,tgtMonth,copied,skipped)=>{ onBulkAdd(entries); if(notify) notify(`✅ Copied ${copied} entr${copied===1?"y":"ies"} to ${tgtMonth}${skipped>0?` (${skipped} skipped)`:""}`); }}/>
      <Confirm open={!!confirm} msg="Delete this gift entry?" onOk={()=>{onDelete(confirm);setConfirm(null);}} onCancel={()=>setConfirm(null)}/>

      {/* Filters */}
      <div className="flex flex-wrap gap-2 mb-4">
        <input value={search} onChange={e=>setSearch(e.target.value)} className="inp" style={{maxWidth:220}} placeholder="🔍 Search..."/>
        <select value={fMonth} onChange={e=>setFMonth(e.target.value)} className="inp" style={{maxWidth:160}}>
          <option value="all">All Months</option>
          {months.map(m=><option key={m}>{m}</option>)}
        </select>
        <select value={fAsm} onChange={e=>setFAsm(e.target.value)} className="inp" style={{maxWidth:160}}>
          <option value="all">All ASMs</option>
          {ASM_LIST.map(a=><option key={a}>{a}</option>)}
        </select>
        <select value={fHQ} onChange={e=>setFHQ(e.target.value)} className="inp" style={{maxWidth:160}}>
          <option value="all">All HQs</option>
          {HQ_LIST.map(h=><option key={h}>{h}</option>)}
        </select>
        <select value={fStatus} onChange={e=>setFStatus(e.target.value)} className="inp" style={{maxWidth:160}}>
          <option value="all">All Status</option>
          <option value="pending">Pending</option>
          <option value="issued">Issued</option>
        </select>
        <select value={fLocation} onChange={e=>setFLocation(e.target.value)} className="inp" style={{maxWidth:160}}>
          <option value="all">All Locations</option>
          {locations.map(l=><option key={l}>{l}</option>)}
        </select>
        <div className="flex-1"/>
        <button onClick={()=>setCopyModal(true)} className="btn text-xs" style={{background:"#ede9fe",color:"#5b21b6",border:"1px solid #c4b5fd",fontWeight:700}}>📋 Copy Month</button>
        <button id="quick-add-gifts-btn" className="btn btn-primary text-xs" onClick={()=>{setEditG(null);setModal(true);}}>🎁 + New Gift Entry</button>
      </div>

      {/* Summary strip */}
      <div className="grid grid-cols-4 gap-3 mb-4">
        {[
          {label:"Total Planned",val:filtered.length,color:"#dbeafe",tc:"#1e40af"},
          {label:"Issued",val:filtered.filter(g=>g.issued).length,color:"#d1fae5",tc:"#065f46"},
          {label:"Pending",val:filtered.filter(g=>!g.issued).length,color:"#fef3c7",tc:"#92400e"},
          {label:"Gift Value (Plan)",val:fmt(planTotal),color:"#ede9fe",tc:"#5b21b6"},
        ].map(s=>(
          <div key={s.label} style={{background:s.color,borderRadius:12,padding:"12px 16px"}}>
            <div className="section-label" style={{color:s.tc}}>{s.label}</div>
            <div className="font-black text-xl" style={{color:s.tc}}>{s.val}</div>
          </div>
        ))}
      </div>

      <div className="card overflow-hidden">
        <div className="overflow-x-auto">
          <table className="w-full tbl">
            <thead><tr>
              <th>#</th><th>Month</th><th>ASM / HQ</th><th>Doctor</th><th>Location</th><th>Gift</th><th>MRP</th><th>CRM</th><th>Plan Sales</th><th>Status</th><th>Actual Sales</th><th>ROI</th><th></th>
            </tr></thead>
            <tbody>
              {filtered.map((g, i) => {
                const planAmt = (g.crmType==="CRM"?(g.giftPlanSales||[]).reduce((s,r)=>s+Number(r.amt||0),0):(g.planSales||[]).reduce((s,r)=>s+Number(r.amt||0),0));
                const actAmt  = g.issued ? (g.crmType==="CRM"?(g.giftActualSales||g.actualSales||[]).reduce((s,r)=>s+Number(r.amt||0),0):(g.actualSales||[]).reduce((s,r)=>s+Number(r.amt||0),0)) : 0;
                const roi = g.issued ? calcRoi(g) : null;
                return (
                  <tr key={g.id}>
                    <td className="text-gray-400 text-xs">{i+1}</td>
                    <td className="text-xs font-semibold text-gray-600">{g.month}</td>
                    <td><div className="font-semibold text-gray-800 text-xs">{g.asmName}</div><div className="text-gray-400 text-xs">{g.hqName}</div></td>
                    <td>
                      <div className="font-semibold">{g.doctorName}</div>
                      <div className="text-gray-400 text-xs">{g.speciality}</div>
                    </td>
                    <td className="text-xs text-gray-600">{g.location||"—"}</td>
                    <td>
                      <div className="font-semibold text-xs">{g.giftName}</div>
                      {g.productName && <div className="text-xs text-indigo-500">{g.productName}</div>}
                      {g.photoUrl && g.issued && <img src={g.photoUrl} alt="gift" style={{width:32,height:32,objectFit:"cover",borderRadius:6,marginTop:3,border:"1px solid #e2e8f0"}} onClick={()=>window.open(g.photoUrl,"_blank")} className="cursor-pointer"/>}
                    </td>
                    <td className="mono font-bold text-indigo-700">{fmt(g.giftMrp)}</td>
                    <td><span className={`badge ${g.crmType==="CRM"?"bg-blue-100 text-blue-700":"bg-gray-100 text-gray-600"}`}>{g.crmType}</span></td>
                    <td className="mono text-xs">{planAmt>0?fmt(planAmt):"—"}</td>
                    <td>
                      {g.issued
                        ? <span className="badge issued-chip">✓ Issued{g.issueDate?` ${g.issueDate}`:""}</span>
                        : <span className="badge pending-chip">⏳ Pending</span>}
                    </td>
                    <td className="mono text-xs">{g.issued&&actAmt>0?fmt(actAmt):"—"}</td>
                    <td>{(()=>{ const rc=roiClass(roi); return rc?<span style={{fontWeight:800,color:rc.color,fontSize:11}}>{Number(roi).toFixed(2)}x<br/><span style={{fontSize:9}}>{rc.label}</span></span>:<span className="text-gray-300 text-xs">—</span>; })()}</td>
                    <td>
                      <div className="flex gap-1 items-center">
                        <button onClick={()=>{setEditG({...g,_openTab:"actual"});setModal(true);}}
                          style={{fontSize:10,fontWeight:800,padding:"3px 7px",borderRadius:6,background:"#eff6ff",color:"#2563eb",border:"1px solid #bfdbfe",cursor:"pointer",fontFamily:"inherit",whiteSpace:"nowrap"}}>
                          ✅ Actual
                        </button>
                        <button onClick={()=>{setEditG(g);setModal(true);}} className="text-blue-300 hover:text-blue-600">✏️</button>
                        <button onClick={()=>setConfirm(g.id)} className="text-gray-200 hover:text-red-500">🗑️</button>
                      </div>
                    </td>
                  </tr>
                );
              })}
            </tbody>
          </table>
          {filtered.length===0 && <div className="text-center py-12 text-gray-300 text-sm">No gift entries found</div>}
        </div>
      </div>
    </div>
  );
}

/* ══════════════════════════════════
   DASHBOARD
══════════════════════════════════ */
function Dashboard({ gifts, onShare }) {
  const [selMonth, setSelMonth] = useState("all");
  const [selAsm,   setSelAsm]   = useState("all");
  const [selHQ,    setSelHQ]    = useState("all");
  const months = [...new Set(gifts.map(g=>g.month).filter(Boolean))].sort();
  const hqs    = [...new Set(gifts.map(g=>g.hqName).filter(Boolean))].sort();

  const fGifts = gifts.filter(g=>{
    if(selMonth!=="all" && g.month!==selMonth) return false;
    if(selAsm!=="all"   && g.asmName!==selAsm) return false;
    if(selHQ!=="all"    && g.hqName!==selHQ)   return false;
    return true;
  });

  // RSM Bihar → ASM → HQ rollup
  const regionMap = { "RSM Bihar": {} };
  fGifts.forEach(g => {
    const reg = "RSM Bihar";
    const area = g.asmName||"(No ASM)";
    const hq = g.hqName||"(No HQ)";
    if (!regionMap[reg]) regionMap[reg] = {};
    if (!regionMap[reg][area]) regionMap[reg][area] = {};
    if (!regionMap[reg][area][hq]) regionMap[reg][area][hq] = { gifts:[], planned:0, issued:0, planAmt:0, actAmt:0, planSales:0, actSales:0 };
    const entry = regionMap[reg][area][hq];
    entry.gifts.push(g);
    entry.planned++;
    entry.planAmt += Number(g.giftMrp||0);
    entry.planSales += (g.crmType==="CRM"?(g.giftPlanSales||[]).reduce((s,r)=>s+Number(r.amt||0),0):(g.planSales||[]).reduce((s,r)=>s+Number(r.amt||0),0));
    if (g.issued) {
      entry.issued++;
      entry.actAmt += Number(g.giftMrp||0);
      entry.actSales += g.issued ? (g.crmType==="CRM"?(g.giftActualSales||g.actualSales||[]).reduce((s,r)=>s+Number(r.amt||0),0):(g.actualSales||[]).reduce((s,r)=>s+Number(r.amt||0),0)) : 0;
      entry.giftActSales = (entry.giftActSales||0) + (g.crmType==="CRM"
        ? (g.giftActualSales||[]).reduce((s,r)=>s+Number(r.amt||0),0)
        : (g.actualSales||[]).reduce((s,r)=>s+Number(r.amt||0),0));
      entry.giftPlanAmt = (entry.giftPlanAmt||0) + Number(g.giftMrp||0);
    }
  });

  // Pending
  const pending = fGifts.filter(g=>!g.issued);
  const pendingByArea = {};
  pending.forEach(g=>{
    const area = g.area||"(No Area)";
    if (!pendingByArea[area]) pendingByArea[area] = { count:0, hqs:{} };
    pendingByArea[area].count++;
    const hq = g.hqName||"(No HQ)";
    if (!pendingByArea[area].hqs[hq]) pendingByArea[area].hqs[hq] = 0;
    pendingByArea[area].hqs[hq]++;
  });

  // Overall totals
  const totals = fGifts.reduce((acc,g)=>{
    acc.planned++;
    acc.planAmt += Number(g.giftMrp||0);
    acc.planSales += (g.crmType==="CRM"?(g.giftPlanSales||[]).reduce((s,r)=>s+Number(r.amt||0),0):(g.planSales||[]).reduce((s,r)=>s+Number(r.amt||0),0));
    if (g.issued) {
      acc.issued++;
      acc.actAmt += Number(g.giftMrp||0);
      acc.actSales += g.issued ? (g.crmType==="CRM"?(g.giftActualSales||g.actualSales||[]).reduce((s,r)=>s+Number(r.amt||0),0):(g.actualSales||[]).reduce((s,r)=>s+Number(r.amt||0),0)) : 0;
    }
    return acc;
  }, { planned:0, issued:0, planAmt:0, actAmt:0, planSales:0, actSales:0 });
  const overallROI = totals.actAmt>0&&totals.actSales>0 ? (totals.actSales/totals.actAmt).toFixed(2) : null;

  const [expanded, setExpanded] = useState({});
  const toggle = k => setExpanded(e=>({...e,[k]:!e[k]}));

  return (
    <div className="space-y-5">
      {/* Filters */}
      <div className="flex flex-wrap gap-2 items-center">
        <select value={selMonth} onChange={e=>setSelMonth(e.target.value)} className="inp" style={{maxWidth:160}}>
          <option value="all">All Months</option>
          {months.map(m=><option key={m}>{m}</option>)}
        </select>
        <select value={selAsm} onChange={e=>setSelAsm(e.target.value)} className="inp" style={{maxWidth:160}}>
          <option value="all">All ASMs</option>
          {ASM_LIST.map(a=><option key={a}>{a}</option>)}
        </select>
        <select value={selHQ} onChange={e=>setSelHQ(e.target.value)} className="inp" style={{maxWidth:160}}>
          <option value="all">All HQs</option>
          {hqs.map(h=><option key={h}>{h}</option>)}
        </select>
        <div className="flex-1"/>
        <button className="btn btn-ghost text-xs" onClick={()=>onShare("dashboard", fGifts, selMonth==="all"?"All Months":selMonth)}>📤 Share Dashboard</button>
      </div>

      {/* KPI Strip */}
      <div className="grid grid-cols-2 md:grid-cols-4 gap-3">
        {[
          {l:"Gifts Planned",v:totals.planned,c:"#dbeafe",tc:"#1d4ed8"},
          {l:"Gifts Issued",v:totals.issued,c:"#d1fae5",tc:"#065f46"},
          {l:"Gift Plan Amt",v:fmt(totals.planAmt),c:"#ede9fe",tc:"#5b21b6"},
          {l:"Gift Actual Amt",v:fmt(totals.actAmt),c:"#fef3c7",tc:"#92400e"},
          {l:"Planned Sales",v:fmt(totals.planSales),c:"#e0f2fe",tc:"#0369a1"},
          {l:"Actual Sales",v:fmt(totals.actSales),c:"#dcfce7",tc:"#166534"},
          {l:"Overall ROI",v:overallROI?`${overallROI}x`:"—",c:overallROI&&Number(overallROI)>=1?"#dcfce7":"#fee2e2",tc:overallROI&&Number(overallROI)>=1?"#166534":"#991b1b"},
          {l:"Pending",v:totals.planned-totals.issued,c:"#fff7ed",tc:"#c2410c"},
        ].map(s=>(
          <div key={s.l} style={{background:s.c,borderRadius:14,padding:"14px 16px"}}>
            <div className="section-label" style={{color:s.tc,opacity:.7}}>{s.l}</div>
            <div className="font-black text-xl mono" style={{color:s.tc}}>{s.v}</div>
          </div>
        ))}
      </div>

      {/* Region → Area → HQ Table */}
      <div className="card p-5">
        <h3 className="font-black text-gray-800 mb-4">🗺️ Region-wise Summary</h3>
        <div className="overflow-x-auto">
          <table className="w-full tbl">
            <thead><tr>
              <th>RSM Bihar / ASM / HQ</th><th>Month</th><th>Planned</th><th>Issued</th><th>Plan Amt</th><th>Act Amt</th><th>Plan Sales</th><th>Act Sales</th><th>ROI</th><th></th>
            </tr></thead>
            <tbody>
              {Object.entries(regionMap).map(([reg, areas]) => {
                const rTot = { planned:0, issued:0, planAmt:0, actAmt:0, planSales:0, actSales:0 };
                Object.values(areas).forEach(hqs=>Object.values(hqs).forEach(h=>{
                  rTot.planned+=h.planned; rTot.issued+=h.issued; rTot.planAmt+=h.planAmt;
                  rTot.actAmt+=h.actAmt; rTot.planSales+=h.planSales; rTot.actSales+=h.actSales;
                }));
                const rROI = rTot.actAmt>0&&rTot.actSales>0?(rTot.actSales/rTot.actAmt).toFixed(2):null;
                const regExpanded = expanded[reg];

                return [
                  <tr key={reg} style={{background:"#1e3a5f",cursor:"pointer",WebkitTapHighlightColor:"transparent"}} onClick={()=>toggle(reg)}>
                    <td style={{color:"#ffffff",fontWeight:800,fontSize:13,padding:"10px 12px"}}>{regExpanded?"▼":"▶"} {reg}</td>
                    <td style={{color:"#bfdbfe",fontSize:11,padding:"10px 12px"}}>{[selMonth==="all"?"All":selMonth,selAsm==="all"?"":selAsm,selHQ==="all"?"":selHQ].filter(Boolean).join(" · ")||"All"}</td>
                    <td style={{color:"#93c5fd",fontWeight:800,padding:"10px 12px"}}>{rTot.planned}</td>
                    <td style={{color:"#6ee7b7",fontWeight:800,padding:"10px 12px"}}>{rTot.issued}</td>
                    <td style={{color:"#e9d5ff",fontWeight:800,padding:"10px 12px"}} className="mono">{fmt(rTot.planAmt)}</td>
                    <td style={{color:"#fcd34d",fontWeight:800,padding:"10px 12px"}} className="mono">{fmt(rTot.actAmt)}</td>
                    <td style={{color:"#7dd3fc",fontWeight:800,padding:"10px 12px"}} className="mono">{fmt(rTot.planSales)}</td>
                    <td style={{color:"#86efac",fontWeight:800,padding:"10px 12px"}} className="mono">{fmt(rTot.actSales)}</td>
                    <td style={{fontWeight:800,color:rROI?(roiClass(rROI)||{color:"#fca5a5"}).color:"#94a3b8",padding:"10px 12px"}}>{rROI?(()=>{const rc=roiClass(rROI);return rc?`${rROI}x ${rc.label}`:rROI+"x";})():"—"}</td>
                    <td style={{padding:"10px 8px"}}><button style={{background:"rgba(255,255,255,0.2)",border:"1px solid rgba(255,255,255,0.4)",color:"#ffffff",borderRadius:6,padding:"3px 8px",fontSize:11,cursor:"pointer",fontWeight:700,WebkitTapHighlightColor:"transparent"}} onClick={e=>{e.stopPropagation();onShare("rsm",fGifts,reg+" — "+(selMonth==="all"?"All Months":selMonth),"rsm",{areas});}}> 📤</button></td>
                  </tr>,
                  ...(!regExpanded ? [] : Object.entries(areas).flatMap(([area, hqs]) => {
                    const aTot = { planned:0, issued:0, planAmt:0, actAmt:0, planSales:0, actSales:0 };
                    Object.values(hqs).forEach(h=>{ aTot.planned+=h.planned; aTot.issued+=h.issued; aTot.planAmt+=h.planAmt; aTot.actAmt+=h.actAmt; aTot.planSales+=h.planSales; aTot.actSales+=h.actSales; });
                    const aROI = aTot.actAmt>0&&aTot.actSales>0?(aTot.actSales/aTot.actAmt).toFixed(2):null;
                    const aKey = `${reg}_${area}`;
                    const aExpanded = expanded[aKey];

                    return [
                      <tr key={aKey} style={{background:"#f0f4f8",cursor:"pointer"}} onClick={e=>{e.stopPropagation();toggle(aKey);}}>
                        <td style={{fontWeight:700,paddingLeft:24}}>{aExpanded?"▼":"▶"} {area}</td>
                        <td className="text-xs text-gray-400">{selMonth==="all"?"All":selMonth}</td>
                        <td className="font-bold text-blue-700">{aTot.planned}</td>
                        <td className="font-bold text-emerald-700">{aTot.issued}</td>
                        <td className="mono font-bold text-purple-700">{fmt(aTot.planAmt)}</td>
                        <td className="mono font-bold text-amber-700">{fmt(aTot.actAmt)}</td>
                        <td className="mono font-bold text-cyan-700">{fmt(aTot.planSales)}</td>
                        <td className="mono font-bold text-green-700">{fmt(aTot.actSales)}</td>
                        <td>{(()=>{const rc=roiClass(aROI);return rc?<span style={{fontWeight:800,color:rc.color}}>{aROI}x {rc.label}</span>:<span className="text-gray-300">—</span>;})()}</td>
                        <td><button className="text-xs btn btn-ghost py-1 px-2" onClick={e=>{e.stopPropagation();onShare("asm",Object.values(hqs).flatMap(h=>h.gifts),area+" — "+(selMonth==="all"?"All Months":selMonth),"asm",{hqs});}}> 📤</button></td>
                      </tr>,
                      ...(!aExpanded ? [] : Object.entries(hqs).map(([hq, h]) => {
                        const hROI = h.actAmt>0&&h.actSales>0?(h.actSales/h.actAmt).toFixed(2):null;
                        return (
                          <tr key={`${aKey}_${hq}`}>
                            <td style={{paddingLeft:44}} className="text-sm">{hq}</td>
                            <td className="text-xs text-gray-400">{selMonth==="all"?"All":selMonth}</td>
                            <td>{h.planned}</td>
                            <td className="text-emerald-700">{h.issued}</td>
                            <td className="mono text-purple-600">{fmt(h.planAmt)}</td>
                            <td className="mono text-amber-600">{fmt(h.actAmt)}</td>
                            <td className="mono text-cyan-600">{fmt(h.planSales)}</td>
                            <td className="mono text-green-600">{fmt(h.actSales)}</td>
                            <td>{(()=>{const rc=roiClass(hROI);return rc?<span style={{fontWeight:800,color:rc.color}}>{hROI}x {rc.label}</span>:<span className="text-gray-300">—</span>;})()}</td>
                            <td><button className="text-xs btn btn-ghost py-1 px-2" onClick={()=>onShare("hq",h.gifts,hq+" — "+(selMonth==="all"?"All Months":selMonth),"hq",{hq})}>📤</button></td>
                          </tr>
                        );
                      }))
                    ];
                  }))
                ];
              })}
            </tbody>
          </table>
          {Object.keys(regionMap).length===0 && <div className="text-center py-10 text-gray-300 text-sm">No data yet</div>}
        </div>
      </div>

      {/* Pending Summary — tree structure RSM→ASM→HQ */}
      <div className="card p-5">
        <div className="flex justify-between items-center mb-1">
          <h3 className="font-black text-gray-800">⏳ Pending Gift Actual Entries ({pending.length})</h3>
          {pending.length>0 && (
            <button className="btn btn-ghost text-xs" onClick={()=>onShare("pending",pending,"Pending — "+(selMonth==="all"?"All Months":selMonth),"rsm",{})}>📤 RSM Share</button>
          )}
        </div>
        <p className="text-xs text-gray-400 mb-3">
          {[selMonth!=="all"?selMonth:null,selAsm!=="all"?selAsm:null,selHQ!=="all"?selHQ:null].filter(Boolean).join(" · ")||"All filters"} — Gifts planned but not yet confirmed as issued
        </p>
        {pending.length===0
          ? <div style={{textAlign:"center",padding:"24px 0",color:"#86efac",fontWeight:800,fontSize:15}}>✅ No pending entries for selected filters!</div>
          : (
          <div className="overflow-x-auto">
            <table className="w-full tbl">
              <thead><tr>
                <th>RSM Bihar / ASM / HQ / Doctor</th><th>Month</th><th>Count</th><th>Value</th><th></th>
              </tr></thead>
              <tbody>
                {/* RSM Bihar summary row */}
                <tr style={{background:"#1e3a5f",cursor:"pointer"}} onClick={()=>toggle("pend_rsm")}>
                  <td style={{color:"white",fontWeight:800}}>{expanded["pend_rsm"]?"▼":"▶"} RSM Bihar</td>
                  <td style={{color:"rgba(255,255,255,0.6)",fontSize:11}}>{selMonth==="all"?"All":selMonth}</td>
                  <td style={{color:"#fbbf24",fontWeight:800}}>{pending.length}</td>
                  <td style={{color:"#fbbf24",fontWeight:800}} className="mono">{fmt(pending.reduce((s,g)=>s+Number(g.giftMrp||0),0))}</td>
                  <td><button style={{background:"rgba(255,255,255,0.15)",border:"1px solid rgba(255,255,255,0.3)",color:"white",borderRadius:6,padding:"3px 8px",fontSize:11,cursor:"pointer",fontWeight:700}} onClick={e=>{e.stopPropagation();onShare("pending",pending,"Pending RSM Bihar — "+(selMonth==="all"?"All Months":selMonth),"rsm",{});}}>📤</button></td>
                </tr>
                {expanded["pend_rsm"] && ASM_LIST.map(asm=>{
                  const asmP = pending.filter(g=>g.asmName===asm);
                  if(!asmP.length) return null;
                  const asmKey = "pend_"+asm;
                  return [
                    <tr key={asmKey} style={{background:"#fef9c3",cursor:"pointer"}} onClick={e=>{e.stopPropagation();toggle(asmKey);}}>
                      <td style={{fontWeight:700,paddingLeft:20,color:"#92400e"}}>{expanded[asmKey]?"▼":"▶"} {asm}</td>
                      <td className="text-xs text-gray-400">{selMonth==="all"?"All":selMonth}</td>
                      <td style={{fontWeight:800,color:"#b45309"}}>{asmP.length}</td>
                      <td style={{fontWeight:800,color:"#b45309"}} className="mono">{fmt(asmP.reduce((s,g)=>s+Number(g.giftMrp||0),0))}</td>
                      <td><button className="text-xs btn btn-ghost py-1 px-2" onClick={e=>{e.stopPropagation();onShare("pending",asmP,"Pending "+asm+" — "+(selMonth==="all"?"All Months":selMonth),"asm",{});}}>📤</button></td>
                    </tr>,
                    ...(expanded[asmKey] ? (() => {
                      // Group by HQ
                      const hqMap = {};
                      asmP.forEach(g=>{ const h=g.hqName||"(No HQ)"; if(!hqMap[h]) hqMap[h]=[]; hqMap[h].push(g); });
                      return Object.entries(hqMap).flatMap(([hq, hqGifts])=>{
                        const hqKey = asmKey+"_"+hq;
                        return [
                          <tr key={hqKey} style={{background:"#fff7ed",cursor:"pointer"}} onClick={e=>{e.stopPropagation();toggle(hqKey);}}>
                            <td style={{fontWeight:600,paddingLeft:36,color:"#c2410c",fontSize:13}}>{expanded[hqKey]?"▼":"▶"} {hq}</td>
                            <td className="text-xs text-gray-400">{selMonth==="all"?"All":selMonth}</td>
                            <td style={{fontWeight:700,color:"#c2410c"}}>{hqGifts.length}</td>
                            <td style={{fontWeight:700,color:"#c2410c"}} className="mono">{fmt(hqGifts.reduce((s,g)=>s+Number(g.giftMrp||0),0))}</td>
                            <td><button className="text-xs btn btn-ghost py-1 px-2" onClick={e=>{e.stopPropagation();onShare("pending",hqGifts,"Pending "+hq+" — "+(selMonth==="all"?"All Months":selMonth),"hq",{});}}>📤</button></td>
                          </tr>,
                          ...(expanded[hqKey] ? hqGifts.map(g=>(
                            <tr key={g.id} style={{background:"#fff"}}>
                              <td style={{paddingLeft:52,fontSize:12}}>{g.doctorName}</td>
                              <td><span className="badge planned-chip" style={{fontSize:10}}>{g.month}</span></td>
                              <td className="text-gray-400 text-xs">1</td>
                              <td className="mono text-xs font-bold text-indigo-700">{fmt(g.giftMrp)}</td>
                              <td className="text-gray-400 text-xs">{g.giftName}</td>
                            </tr>
                          )) : [])
                        ];
                      });
                    })() : [])
                  ];
                })}
              </tbody>
            </table>
          </div>
        )}
      </div>
    </div>
  );
}

/* ══════════════════════════════════
   REPORTS
══════════════════════════════════ */
function Reports({ gifts, products }) {
  const [repType, setRepType] = useState("deviation");
  const [selMonth, setSelMonth] = useState("all");
  const [selArea, setSelArea] = useState("all");
  const [selHQ, setSelHQ] = useState("all");
  const [inclPlan, setInclPlan] = useState(true);
  const [inclActual, setInclActual] = useState(true);
  const [inclProdDet, setInclProdDet] = useState(false);
  const [groupBy, setGroupBy] = useState("area");

  const months = [...new Set(gifts.map(g=>g.month).filter(Boolean))].sort();
  // ASM list is fixed
  const hqs    = [...new Set(gifts.map(g=>g.hqName).filter(Boolean))].sort();

  let filtered = gifts;
  if (selMonth !== "all") filtered = filtered.filter(g=>g.month===selMonth);
  if (selArea !== "all")  filtered = filtered.filter(g=>g.asmName===selArea);
  if (selHQ !== "all")    filtered = filtered.filter(g=>g.hqName===selHQ);

  const generateHTML = () => {
    const css = `body{font-family:'DM Sans',Arial,sans-serif;font-size:13px;color:#1f2937;padding:24px;}h1{font-size:18px;font-weight:800;color:#1e3a5f;border-bottom:2px solid #2563eb;padding-bottom:8px;margin-bottom:4px;}h2{font-size:14px;font-weight:700;color:#374151;margin:16px 0 6px;border-left:3px solid #2563eb;padding-left:8px;}table{width:100%;border-collapse:collapse;font-size:12px;}th{background:#1e3a5f;color:white;padding:7px 10px;text-align:left;font-size:11px;text-transform:uppercase;}td{padding:6px 10px;border-bottom:1px solid #f0f0f0;}tr:nth-child(even) td{background:#f9fafb;}.tf td{background:#e8edf5;font-weight:800;border-top:2px solid #2563eb;}.g{color:#059669;font-weight:700}.r{color:#dc2626;font-weight:700}.meta{font-size:11px;color:#6b7280;margin-bottom:16px}.badge{display:inline-block;padding:2px 8px;border-radius:20px;font-size:10px;font-weight:700}.issued{background:#d1fae5;color:#065f46}.pending{background:#fef3c7;color:#92400e}@media print{@page{margin:15mm;size:A4}}`;

    let body = `<h1>🎁 GiftTrack – Aldan Healthcare</h1>
    <div class="meta">Report: <strong>${repType.toUpperCase()}</strong> | Month: ${selMonth==="all"?"All":selMonth} | Area: ${selArea==="all"?"All":selArea} | Generated: ${new Date().toLocaleDateString("en-IN",{day:"numeric",month:"long",year:"numeric"})}</div>`;

    if (repType === "deviation") {
      body += `<h2>Gift Plan vs Actual Deviation</h2>
      <table style="table-layout:fixed;width:100%">
        <colgroup><col style="width:8%"><col style="width:11%"><col style="width:11%"><col style="width:13%"><col style="width:13%"><col style="width:8%"><col style="width:9%"><col style="width:7%"><col style="width:9%"><col style="width:6%"><col style="width:9%"></colgroup>
        <thead><tr><th>Month</th><th>ASM</th><th>HQ</th><th>Doctor</th><th>Gift</th><th>MRP</th><th>Plan Sales</th><th>Status</th><th>Act Sales</th><th>ROI</th><th>Deviation</th></tr></thead><tbody>`;
      filtered.forEach(g => {
        const ps = (g.crmType==="CRM"?(g.giftPlanSales||[]).reduce((s,r)=>s+Number(r.amt||0),0):(g.planSales||[]).reduce((s,r)=>s+Number(r.amt||0),0));
        const as = g.issued ? (g.crmType==="CRM"?(g.giftActualSales||g.actualSales||[]).reduce((s,r)=>s+Number(r.amt||0),0):(g.actualSales||[]).reduce((s,r)=>s+Number(r.amt||0),0)) : 0;
        const roi = g.issued ? calcRoi(g) : null;
        const dev = g.issued ? as - ps : null;
        const roiLbl = roi?(Number(roi)<3?"Poor":Number(roi)<4?"Avg":Number(roi)<5?"Good":"Excel"):"";
        body += `<tr>
          <td style="font-size:10px">${g.month||"—"}</td>
          <td style="font-size:10px">${g.asmName||"—"}</td>
          <td style="font-size:10px">${g.hqName||"—"}</td>
          <td><strong>${g.doctorName}</strong></td>
          <td style="font-size:10px">${g.giftName}</td>
          <td>₹${Math.round(g.giftMrp||0)}</td>
          <td>₹${Math.round(ps)}</td>
          <td><span class="badge ${g.issued?"issued":"pending"}">${g.issued?"✓":"⏳"}</span></td>
          <td>${as>0?"₹"+Math.round(as):"—"}</td>
          <td class="${roi?(Number(roi)>=3?"g":"r"):""}"><strong>${roi?roi+"x":"—"}</strong></td>
          <td class="${dev!=null?(dev>=0?"g":"r"):""}"><strong>${dev!=null?(dev>=0?"+":"")+fmt(dev):"—"}</strong></td>
        </tr>`;
      });
      body += "</tbody></table>";
    }

    if (repType === "summary") {
      const groups = {};
      filtered.forEach(g => {
        const key = groupBy==="asm"?g.asmName:groupBy==="hq"?g.hqName:g.month;
        if (!groups[key||"—"]) groups[key||"—"] = [];
        groups[key||"—"].push(g);
      });
      body += `<h2>ASM/HQ/Month Gift Summary</h2>
      <table style="table-layout:fixed;width:100%">
        <colgroup><col style="width:14%"><col style="width:10%"><col style="width:10%"><col style="width:10%"><col style="width:14%"><col style="width:14%"><col style="width:14%"><col style="width:14%"></colgroup>
        <thead><tr><th>Group</th><th>Planned</th><th>Issued</th><th>Pending</th><th>Gift Amt</th><th>Plan Sales</th><th>Act Sales</th><th>ROI</th></tr></thead><tbody>`;
      Object.entries(groups).forEach(([grp, gs]) => {
        const planned = gs.length;
        const issued  = gs.filter(g=>g.issued).length;
        const planAmt = gs.reduce((s,g)=>s+Number(g.giftMrp||0),0);
        const actAmt  = gs.filter(g=>g.issued).reduce((s,g)=>s+Number(g.giftMrp||0),0);
        const planSales = gs.reduce((s,g)=>s+(g.crmType==="CRM"?(g.giftPlanSales||[]).reduce((s,r)=>s+Number(r.amt||0),0):(g.planSales||[]).reduce((s,r)=>s+Number(r.amt||0),0)),0);
        const actSales  = gs.reduce((s,g)=>s+(g.issued?(g.crmType==="CRM"?(g.giftActualSales||g.actualSales||[]).reduce((s,r)=>s+Number(r.amt||0),0):(g.actualSales||[]).reduce((s,r)=>s+Number(r.amt||0),0)):0),0);
        const actMrp = gs.filter(g=>g.issued).reduce((s,g)=>s+Number(g.giftMrp||0),0);
        const roi = actMrp>0&&actSales>0?(actSales/actMrp).toFixed(2):null;
        const roiLbl = roi?(Number(roi)<3?"Poor":Number(roi)<4?"Avg":Number(roi)<5?"Good":"Excellent"):"—";
        body += `<tr>
          <td><strong>${grp}</strong></td>
          <td>${planned}</td><td class="g">${issued}</td><td class="${planned-issued>0?"r":"g"}">${planned-issued}</td>
          <td>${fmt(planAmt)}</td><td>${fmt(planSales)}</td><td>${fmt(actSales)}</td>
          <td class="${roi?(Number(roi)>=3?"g":"r"):""}"><strong>${roi?roi+"x — "+roiLbl:"—"}</strong></td>
        </tr>`;
        if (inclProdDet) {
          gs.forEach(g => {
            const actSalesG = g.issued ? (g.crmType==="CRM"?(g.giftActualSales||g.actualSales||[]).reduce((s,r)=>s+Number(r.amt||0),0):(g.actualSales||[]).reduce((s,r)=>s+Number(r.amt||0),0)) : 0;
            const planSalesG = (g.crmType==="CRM"?(g.giftPlanSales||[]).reduce((s,r)=>s+Number(r.amt||0),0):(g.planSales||[]).reduce((s,r)=>s+Number(r.amt||0),0));
            const roiG = g.issued ? calcRoi(g) : null;
            const roiLabel = roiG ? (Number(roiG)<3?"Poor":Number(roiG)<4?"Average":Number(roiG)<5?"Good":"Excellent") : "—";
            body += `<div style="margin:6px 0;padding:10px 12px;border:1px solid #e2e8f0;border-radius:8px;font-size:12px">
              <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px">
                <strong>${g.doctorName}</strong>
                <span style="display:flex;gap:8px;align-items:center">
                  <span class="badge ${g.issued?"issued":"pending"}">${g.issued?"✓ Issued":"⏳ Pending"}</span>

                </span>
              </div>`;
            // Gift Plan sales rows
            const planRows = g.crmType==="CRM"?(g.giftPlanSales||[]):(g.planSales||[]);
            if(planRows.some(r=>r.prod)) {
              body += `<table style="width:100%;font-size:11px;margin-bottom:4px"><thead><tr style="background:#f8fafc"><th style="padding:4px 6px;text-align:left">Product (Gift Plan)</th><th style="padding:4px 6px;text-align:right">Qty</th><th style="padding:4px 6px;text-align:right">PTR</th><th style="padding:4px 6px;text-align:right">Value</th></tr></thead><tbody>`;
              let pSub=0;
              planRows.filter(r=>r.prod).forEach(r=>{
                const amt=Number(r.amt||0); pSub+=amt;
                body+=`<tr><td style="padding:3px 6px">${r.prod}</td><td style="padding:3px 6px;text-align:right">${r.qty||0}</td><td style="padding:3px 6px;text-align:right">₹${Math.round(Number(r.ptr||0))}</td><td style="padding:3px 6px;text-align:right">₹${Math.round(amt)}</td></tr>`;
              });
              body+=`<tr style="background:#eff6ff"><td colspan="3" style="padding:4px 6px;font-weight:700">Gift Plan Sub-Total</td><td style="padding:4px 6px;text-align:right;font-weight:700">₹${Math.round(pSub)}</td></tr></tbody></table>`;
            }
            // Gift Actual sales rows
            const actRows = g.crmType==="CRM"?(g.giftActualSales||g.actualSales||[]):(g.actualSales||[]);
            if(g.issued && actRows.some(r=>r.prod)) {
              body += `<table style="width:100%;font-size:11px"><thead><tr style="background:#f0fdf4"><th style="padding:4px 6px;text-align:left">Product (Gift Actual)</th><th style="padding:4px 6px;text-align:right">Qty</th><th style="padding:4px 6px;text-align:right">PTR</th><th style="padding:4px 6px;text-align:right">Value</th></tr></thead><tbody>`;
              let aSub=0;
              actRows.filter(r=>r.prod).forEach(r=>{
                const amt=Number(r.amt||0); aSub+=amt;
                body+=`<tr><td style="padding:3px 6px">${r.prod}</td><td style="padding:3px 6px;text-align:right">${r.qty||0}</td><td style="padding:3px 6px;text-align:right">₹${Math.round(Number(r.ptr||0))}</td><td style="padding:3px 6px;text-align:right">₹${Math.round(amt)}</td></tr>`;
              });
              body+=`<tr style="background:#dcfce7"><td colspan="3" style="padding:4px 6px;font-weight:700">Gift Actual Sub-Total</td><td style="padding:4px 6px;text-align:right;font-weight:700">₹${Math.round(aSub)}</td></tr></tbody></table>`;
              const roiLabel = roiG ? (Number(roiG)<3?"Poor":Number(roiG)<4?"Average":Number(roiG)<5?"Good":"Excellent") : "—";
              body+=`<div style="margin-top:4px;font-weight:800;color:${Number(roiG||0)<3?"#dc2626":Number(roiG||0)<4?"#d97706":Number(roiG||0)<5?"#2563eb":"#16a34a"}">ROI: ${roiG?roiG+"x — "+roiLabel:"—"}</div>`;
            }
            body += `</div>`;
          });
        }
      });
    }

    if (repType === "pending") {
      const pending = filtered.filter(g=>!g.issued);
      body += `<h2>Pending Gift Actual Entries (${pending.length})</h2>
      <table><thead><tr><th>Month</th><th>ASM</th><th>HQ</th><th>Doctor</th><th>Gift</th><th>Gift MRP</th><th>CRM</th></tr></thead><tbody>`;
      pending.forEach(g => {
        body += `<tr><td>${g.month||"—"}</td><td>${g.asmName||"—"}</td><td>${g.hqName||"—"}</td><td><strong>${g.doctorName}</strong></td><td>${g.giftName}</td><td>${fmt(g.giftMrp)}</td><td>${g.crmType}</td></tr>`;
      });
      body += `</tbody><tfoot><tr class="tf"><td colspan="7"><strong>Total Pending</strong></td><td><strong>${fmt(pending.reduce((s,g)=>s+Number(g.giftMrp||0),0))}</strong></td><td></td></tr></tfoot></table>`;
    }

    if (repType === "leaderboard") {
      const docMap = {};
      filtered.filter(g=>g.issued).forEach(g=>{
        const k=g.doctorName||"Unknown";

        docMap[k].totalMrp+=Number(g.giftMrp||0);
        docMap[k].totalSales+=(g.crmType==="CRM"?(g.giftActualSales||g.actualSales||[]).reduce((s,r)=>s+Number(r.amt||0),0):(g.actualSales||[]).reduce((s,r)=>s+Number(r.amt||0),0));

      const ranked=Object.values(docMap).map(d=>{
        const roi=d.totalMrp>0&&d.totalSales>0?(d.totalSales/d.totalMrp).toFixed(2):null;

        return {...d,roi,roiLbl};
      }).sort((a,b)=>Number(b.roi||0)-Number(a.roi||0));
      body += `<h2>Doctor ROI Leaderboard (${ranked.length} doctors with issued gifts)</h2>

      ranked.forEach((d,i)=>{
        body+=`<tr><td><strong>#${i+1}</strong></td><td><strong>${d.name}</strong></td><td>${d.hq}</td><td>${d.asm}</td><td>${d.gifts}</td><td>${fmt(d.totalMrp)}</td><td>${fmt(d.totalSales)}</td><td class="${d.roi&&Number(d.roi)>=3?"g":"r"}"><strong>${d.roi?d.roi+"x — "+d.roiLbl:"—"}</strong></td></tr>`;

      body+=`</tbody></table>`;
    }

    if (repType === "mom") {
      const months=[...new Set(gifts.map(g=>g.month).filter(Boolean))].sort();
      body += `<h2>Month-over-Month Comparison</h2>
      <table style="table-layout:fixed;width:100%">
        <colgroup><col style="width:12%"><col style="width:10%"><col style="width:10%"><col style="width:10%"><col style="width:14%"><col style="width:14%"><col style="width:14%"><col style="width:16%"></colgroup>
        <thead><tr><th>Month</th><th>Planned</th><th>Issued</th><th>Pending</th><th>Gift Amt</th><th>Plan Sales</th><th>Act Sales</th><th>ROI</th></tr></thead><tbody>`;
      months.forEach(m=>{
        const mg=gifts.filter(g=>g.month===m&&(selArea==="all"||g.asmName===selArea)&&(selHQ==="all"||g.hqName===selHQ));
        const mi=mg.filter(g=>g.issued);
        const mMrp=mg.reduce((s,g)=>s+Number(g.giftMrp||0),0);
        const mPlanSales=mg.reduce((s,g)=>s+(g.crmType==="CRM"?(g.giftPlanSales||[]).reduce((s,r)=>s+Number(r.amt||0),0):(g.planSales||[]).reduce((s,r)=>s+Number(r.amt||0),0)),0);
        const mActSales=mi.reduce((s,g)=>s+(g.crmType==="CRM"?(g.giftActualSales||g.actualSales||[]).reduce((s,r)=>s+Number(r.amt||0),0):(g.actualSales||[]).reduce((s,r)=>s+Number(r.amt||0),0)),0);
        const mActMrp=mi.reduce((s,g)=>s+Number(g.giftMrp||0),0);
        const mRoi=mActMrp>0&&mActSales>0?(mActSales/mActMrp).toFixed(2):null;
        const roiLbl=mRoi?(Number(mRoi)<3?"Poor":Number(mRoi)<4?"Average":Number(mRoi)<5?"Good":"Excellent"):"—";
        body+=`<tr><td><strong>${m}</strong></td><td>${mg.length}</td><td class="g">${mi.length}</td><td class="${mg.length-mi.length>0?"r":"g"}">${mg.length-mi.length}</td><td>${fmt(mMrp)}</td><td>${fmt(mPlanSales)}</td><td>${fmt(mActSales)}</td><td class="${mRoi&&Number(mRoi)>=3?"g":"r"}"><strong>${mRoi?mRoi+"x — "+roiLbl:"—"}</strong></td></tr>`;
      });
      body+=`</tbody></table>`;
    }

    if (repType === "doctor") {
      const docMap={};
      filtered.forEach(g=>{
        const k=g.doctorName||"Unknown";

        docMap[k].gifts.push(g);

      body += `<h2>Doctor-wise Gift Report</h2>`;
      Object.values(docMap).sort((a,b)=>a.name.localeCompare(b.name)).forEach(d=>{

        const totActMrp=issuedG.reduce((s,g)=>s+Number(g.giftMrp||0),0);
        const roi=totActMrp>0&&totSales>0?(totSales/totActMrp).toFixed(2):null;
        const roiLbl=roi?(Number(roi)<3?"Poor":Number(roi)<4?"Average":Number(roi)<5?"Good":"Excellent"):"—";
        body+=`<div style="margin:12px 0 4px;padding:6px 10px;background:#f1f5f9;border-radius:6px;font-size:12px;font-weight:800;color:#1e3a5f">${d.name} <span style="font-weight:400;color:#64748b;font-size:11px">${d.speciality||""}${d.hq?" · "+d.hq:""}${d.asm?" · "+d.asm:""}</span></div>`;
        body+=`<table style="table-layout:fixed;width:100%;margin-bottom:6px">

          <thead><tr><th>Month</th><th>Gift</th><th>MRP</th><th>CRM</th><th>Status</th><th>Plan Sales</th><th>Act Sales</th><th>ROI</th></tr></thead><tbody>`;
        d.gifts.forEach(g=>{
          const ps=(g.crmType==="CRM"?(g.giftPlanSales||[]).reduce((s,r)=>s+Number(r.amt||0),0):(g.planSales||[]).reduce((s,r)=>s+Number(r.amt||0),0));
          const as=g.issued?(g.crmType==="CRM"?(g.giftActualSales||g.actualSales||[]).reduce((s,r)=>s+Number(r.amt||0),0):(g.actualSales||[]).reduce((s,r)=>s+Number(r.amt||0),0)):0;
          const gRoi=g.issued?calcRoi(g):null;
          const gRoiLbl=gRoi?(Number(gRoi)<3?"Poor":Number(gRoi)<4?"Avg":Number(gRoi)<5?"Good":"Excel"):"";
          body+=`<tr><td style="font-size:10px">${g.month||"—"}</td><td style="font-size:10px">${g.giftName}</td><td>${fmt(g.giftMrp)}</td><td>${g.crmType}</td><td><span class="badge ${g.issued?"issued":"pending"}">${g.issued?"✓ Issued":"⏳ Pending"}</span></td><td>${fmt(ps)}</td><td>${as>0?fmt(as):"—"}</td><td class="${gRoi&&Number(gRoi)>=3?"g":"r"}">${gRoi?gRoi+"x "+gRoiLbl:"—"}</td></tr>`;
        });
        body+=`</tbody><tfoot><tr class="tf"><td colspan="2"><strong>Total (${d.gifts.length} gifts)</strong></td><td><strong>${fmt(totMrp)}</strong></td><td></td><td>${issuedG.length}/${d.gifts.length}</td><td></td><td>${fmt(totSales)}</td><td class="${roi&&Number(roi)>=3?"g":"r"}"><strong>${roi?roi+"x — "+roiLbl:"—"}</strong></td></tr></tfoot></table>`;
      });
