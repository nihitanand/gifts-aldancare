name: Monthly GiftTrack Backup

on:
  schedule:
    - cron: '0 0 1 * *'
  workflow_dispatch:

jobs:
  backup:
    runs-on: ubuntu-latest
    steps:
      - name: Create Backup & Save to Firebase + Send Email
        id: backup
        run: |
          python3 << 'PYEOF'
          import json, urllib.request, os
          from datetime import datetime

          DB_URL = "https://fintech-nd-default-rtdb.asia-southeast1.firebasedatabase.app"

          # Read full data
          req = urllib.request.Request(f"{DB_URL}/gifttrack/v1.json")
          with urllib.request.urlopen(req) as r:
              raw = json.loads(r.read())

          def sum_sales(arr):
              rows = arr if isinstance(arr,list) else list(arr.values()) if isinstance(arr,dict) else []
              total = 0
              for r in rows:
                  if r:
                      try: total += float(r.get('amt') or 0)
                      except: pass
              return round(total, 2)

          def to_list(v):
              if isinstance(v, dict): return [x for x in v.values() if x]
              if isinstance(v, list): return [x for x in v if x]
              return []

          gifts = to_list(raw.get('gifts'))
          slim_gifts = []
          for g in gifts:
              slim_gifts.append({
                  'id': g.get('id'), 'month': g.get('month'),
                  'doctorName': g.get('doctorName'), 'hqName': g.get('hqName'),
                  'asmName': g.get('asmName'), 'location': g.get('location'),
                  'speciality': g.get('speciality'), 'giftName': g.get('giftName'),
                  'giftMrp': g.get('giftMrp'), 'crmType': g.get('crmType'),
                  'issued': g.get('issued'), 'issueDate': g.get('issueDate'),
                  'planSalesTotal': sum_sales(g.get('planSales',[])),
                  'giftPlanSalesTotal': sum_sales(g.get('giftPlanSales',[])),
                  'actualSalesTotal': sum_sales(g.get('actualSales',[])),
                  'giftActualSalesTotal': sum_sales(g.get('giftActualSales',[])),
              })

          now = datetime.now()
          filename = f"GiftTrack_Backup_{now.strftime('%Y-%m-%d')}.json"
          backup_key = now.strftime('%Y-%m')

          backup = {
              'generated': now.strftime('%Y-%m-%d %H:%M:%S UTC'),
              'filename': filename,
              'summary': {
                  'gifts': len(slim_gifts),
                  'issued': sum(1 for g in slim_gifts if g.get('issued')),
                  'pending': sum(1 for g in slim_gifts if not g.get('issued')),
                  'months': sorted(set(g.get('month','') for g in slim_gifts if g.get('month')))
              },
              'gifts': slim_gifts,
              'doctors': to_list(raw.get('doctors')),
              'giftItems': to_list(raw.get('giftItems')),
              'products': to_list(raw.get('products')),
          }

          # Save to Firebase backups path
          payload = json.dumps(backup).encode()
          req2 = urllib.request.Request(
              f"{DB_URL}/gifttrack/backups_monthly/{backup_key}.json",
              data=payload, method='PUT',
              headers={'Content-Type': 'application/json'}
          )
          with urllib.request.urlopen(req2) as r:
              r.read()

          size_kb = len(payload) // 1024
          months = ', '.join(backup['summary']['months'])

          print(f"✅ Backup saved to Firebase: gifttrack/backups_monthly/{backup_key}")
          print(f"   Size: {size_kb} KB | Gifts: {len(slim_gifts)} | Issued: {backup['summary']['issued']}")

          with open(os.environ['GITHUB_OUTPUT'], 'a') as f:
              f.write(f"filename={filename}\n")
              f.write(f"size_kb={size_kb}\n")
              f.write(f"issued={backup['summary']['issued']}\n")
              f.write(f"pending={backup['summary']['pending']}\n")
              f.write(f"months={months}\n")
              f.write(f"gifts={len(slim_gifts)}\n")
              f.write(f"backup_key={backup_key}\n")
          PYEOF

      - name: Send Email Notification
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 587
          username: ${{ secrets.MAIL_USERNAME }}
          password: ${{ secrets.MAIL_PASSWORD }}
          to: hr@aldancare.com
          from: GiftTrack Backup <${{ secrets.MAIL_USERNAME }}>
          subject: "✅ GiftTrack Monthly Backup — ${{ steps.backup.outputs.filename }}"
          body: |
            Hi,

            GiftTrack monthly backup completed successfully.

            📁 Backup Details:
            • File        : ${{ steps.backup.outputs.filename }}
            • Stored in   : Firebase → gifttrack/backups_monthly/${{ steps.backup.outputs.backup_key }}
            • Size        : ${{ steps.backup.outputs.size_kb }} KB

            📊 Data Summary:
            • Total Gifts : ${{ steps.backup.outputs.gifts }}
            • Issued      : ${{ steps.backup.outputs.issued }}
            • Pending     : ${{ steps.backup.outputs.pending }}
            • Months      : ${{ steps.backup.outputs.months }}

            To download: Share this email with Claude and ask to fetch and download the backup from Firebase path gifttrack/backups_monthly/${{ steps.backup.outputs.backup_key }}

            Regards,
            GiftTrack — Aldan Healthcare
